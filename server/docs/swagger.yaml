  # =========================================================
  # Каталог: facets
  # =========================================================
  /catalog/facets:
    get:
      tags: [Каталог]
      summary: Получить фасеты (счётчики) для фильтров
      description: |
        Возвращает фасеты для сайдбара фильтров:
          - pricing min/max внутри текущих фильтров
          - variationAxes: axisId -> buckets
          - characteristics: key -> buckets (только filterable характеристики)

        Важно:
          Используй те же фильтры, что и для /catalog/cards, чтобы UI совпадал.

        Типичный flow для фронта:
          1) GET /catalog/cards (получить товары)
          2) GET /catalog/facets (получить счётчики для фильтров)
      parameters:
        - $ref: "#/components/parameters/StatusParam"
        - name: categoryId
          in: query
          required: false
          schema: { type: string }
        - name: categoryInclude
          in: query
          required: false
          schema: { type: string, enum: [branch, self], default: branch }
        - name: q
          in: query
          required: false
          schema: { type: string }
        - name: onlyAvailable
          in: query
