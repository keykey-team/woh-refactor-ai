  # =========================================================
  # Каталог: cards
  # =========================================================
  /catalog/cards:
    get:
      tags: [Каталог]
      summary: Получить карточки каталога (DTO)
      description: |
        ОСНОВНОЙ endpoint каталога. Возвращает карточки ProductGroup с агрегацией Offer.

        ---------------------------------------------------------
        ✅ ПАГИНАЦИЯ
        ---------------------------------------------------------
        Ответ содержит meta:
          - total: всего товаров (ProductGroup) по фильтрам
          - pages: количество страниц

        ---------------------------------------------------------
        ✅ includeOffers
        ---------------------------------------------------------
        includeOffers=none
          - offers: []
          - минимальный ответ для быстрой сетки

        includeOffers=preview
          - offers: [bestOffer] (1 элемент)
          - удобно для UI “цена от ...”

        includeOffers=all
          - offers: все офферы (до maxOffersPerGroup)
          - обычно НЕ нужно для каталога (дорого)

        ---------------------------------------------------------
        ✅ preview по вариациям
        ---------------------------------------------------------
        variantPreview показывает доступные значения первых N осей (depth),
        чтобы в каталоге можно было рисовать “кнопки объёма/цвета” без загрузки всех SKU.

        Параметры:
          - preview=true/false
          - depth=2 (сколько осей показывать)
          - maxValuesPerAxis=6 (сколько значений на ось)

        ---------------------------------------------------------
        ✅ ФИЛЬТРАЦИЯ
        ---------------------------------------------------------

        1) По категории:
          - categoryId + categoryInclude=branch -> включает всю ветку категории (по ancestors)
          - categoryInclude=self -> только прямое совпадение categoryIds

        2) Поиск:
          - q -> по title.ua/title.en (или через текстовый индекс)

        3) По цене:
          - priceMin/priceMax -> фильтр по offers.price

        4) По наличию:
          - onlyAvailable=true -> учитывать только offers.available=true

        5) По вариациям:
          - opt (JSON) по axisId
            пример: opt={"A1":250,"A2":"rose"}

          ⚠️ ВАЖНО ПРО ТИПЫ:
            - если axis.type=number -> значение должно быть number (без кавычек)
            - если axis.type=select/string -> значение строка

        6) По характеристикам:
          - char (JSON) по ProductGroup.characteristics
            примеры:
              char={"brand":"KeratinPro"}
              char={"sulfate_free":true}
              char={"hair_type":["dry","damaged"]}

        ---------------------------------------------------------
        ✅ СОРТИРОВКА
        ---------------------------------------------------------
        Параметр:
          - sort=<mode>

        Поддерживаемые значения:
          - updated_desc (по умолчанию)
          - title_asc
          - price_asc
          - price_desc

        Примечания:
          - sort применяется на уровне БД.
          - price_* сортирует по агрегированной цене группы (pricing.min / pricing.max),
            а не по "первому попавшемуся offer".
          - sort корректно комбинируется с category/q/char/opt/offerChar/priceMin/priceMax/onlyAvailable.

        ---------------------------------------------------------
        ✅ ПРИМЕРЫ ЗАПРОСОВ (готовые)
        ---------------------------------------------------------

        A) Каталог без офферов (быстро):
          GET /catalog/cards?page=1&limit=24

        B) Каталог с лучшим оффером (показывать цену):
          GET /catalog/cards?includeOffers=preview

        C) Фильтр по ветке категории:
          GET /catalog/cards?categoryId=C2&categoryInclude=branch

        D) Поиск:
          GET /catalog/cards?q=keratin

        E) Цена + наличие:
          GET /catalog/cards?onlyAvailable=true&priceMin=300&priceMax=600

        F) Фильтр по вариациям (ось A1=250):
          GET /catalog/cards?opt={"A1":250}

        G) Фильтр по вариациям (A1=250 и A2=rose):
          GET /catalog/cards?opt={"A1":250,"A2":"rose"}

        H) Фильтр по характеристикам:
          GET /catalog/cards?char={"brand":"KeratinPro","sulfate_free":true}

        I) Multiselect характеристика:
          GET /catalog/cards?char={"hair_type":["dry","damaged"]}

        J) ТЕСТ “странных цветов” (как у тебя в facets color):
          GET /catalog/cards?char={"color":"orange"}
          GET /catalog/cards?char={"color":"berry"}
          GET /catalog/cards?char={"color":30}
          GET /catalog/cards?char={"color":null}

          (если color — это ХАРАКТЕРИСТИКА)
          Если же color — это ОСЬ вариации, тогда:
            GET /catalog/cards?opt={"A_COLOR":"orange"}

        ---------------------------------------------------------
        ✅ ПРИМЕРЫ ЗАПРОСОВ С СОРТИРОВКОЙ
        ---------------------------------------------------------

        K) Сортировка по умолчанию:
          GET /catalog/cards?sort=updated_desc

        L) Сортировка по названию (А→Я):
          GET /catalog/cards?sort=title_asc

        M) Сортировка по цене (дешевле сверху):
          GET /catalog/cards?sort=price_asc

        N) Сортировка по цене (дороже сверху):
          GET /catalog/cards?sort=price_desc

        O) Категория + сортировка по цене:
          GET /catalog/cards?categoryId=C2&categoryInclude=branch&sort=price_asc

        P) Поиск + сортировка по цене:
          GET /catalog/cards?q=keratin&sort=price_desc

        Q) Наличие + диапазон цены + сортировка:
          GET /catalog/cards?onlyAvailable=true&priceMin=300&priceMax=600&sort=price_asc

        R) Фильтр по вариациям + сортировка:
          GET /catalog/cards?opt={"A1":250,"A2":"rose"}&sort=price_asc

        S) Фильтр по характеристикам + сортировка:
          GET /catalog/cards?char={"brand":"KeratinPro"}&sort=updated_desc
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/StatusParam"
        - $ref: "#/components/parameters/LanguageParam"

        - name: categoryId
          in: query
          required: false
          schema: { type: string }
          description: ID категории для фильтра.

        - name: categoryInclude
          in: query
          required: false
          schema: { type: string, enum: [branch, self], default: branch }
          description: branch=ветка (по ancestors), self=только категория.

        - name: q
          in: query
          required: false
          schema: { type: string }
          description: Поиск по названию товара.

        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [updated_desc, price_asc, price_desc, title_asc]
            default: updated_desc
          description: Сортировка.

        - name: onlyAvailable
          in: query
          required: false
          schema: { type: boolean, default: false }
          description: Учитывать только offers.available=true.

        - name: priceMin
          in: query
          required: false
          schema: { type: number, nullable: true }
          description: Минимальная цена offer.
        - name: priceMax
          in: query
          required: false
          schema: { type: number, nullable: true }
          description: Максимальная цена offer.

        - name: includeOffers
          in: query
          required: false
          schema: { type: string, enum: [none, preview, all], default: none }
          description: none/preview/all.

        - name: maxOffersPerGroup
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 80 }
          description: Лимит offers при includeOffers=all.

        - name: preview
          in: query
          required: false
          schema: { type: boolean, default: true }
          description: Включить variantPreview.

        - name: depth
          in: query
          required: false
          schema: { type: integer, minimum: 0, maximum: 20, default: 2 }
          description: Кол-во осей в preview.

        - name: maxValuesPerAxis
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 6 }
          description: Лимит значений preview на ось.

        - name: includeCharacteristics
          in: query
          required: false
          schema: { type: boolean, default: false }
          description: Добавить характеристики в карточки.

        - name: char
          in: query
          required: false
          schema: { type: string }
          description: |
            JSON-фильтр характеристик ProductGroup.

            Примеры:
              char={"brand":"KeratinPro"}
              char={"sulfate_free":true}
              char={"hair_type":["dry","damaged"]}

        - name: opt
          in: query
          required: false
          schema: { type: string }
          description: |
            JSON-фильтр вариаций по axisId.

            Примеры:
              opt={"A1":250}
              opt={"A1":250,"A2":"rose"}
      responses:
        "200":
          description: Карточки каталога + meta пагинации
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogCardsResponse" }
              examples:
                ПримерКарточекБезОфферов:
                  value:
                    items:
                      - groupId: "G100"
                        slug: "shampoo-keratin-pro"
                        title: { ua: "Шампунь Keratin Pro", en: "Шампунь Keratin Pro" }
                        imageURL: "https://cdn.site/demo/shampoo/cover.webp"
                        images:
                          - url: "https://cdn.site/demo/shampoo/cover.webp"
                            alt: { ua: "Обкладинка", en: "Обложка" }
                            sort: 10
                        categoryIds: ["C3"]
                        status: "active"
                        pricing: { min: 360, max: 610, currency: "UAH" }
                        availability: { hasAvailable: true, variantsCount: 12 }
                        variantPreview:
                          depth: 2
                          axes:
                            - axisIndex: 0
                              axisId: "A1"
                              title: { ua: "Обʼєм", en: "Объём" }
                              type: "number"
                              unit: "ml"
                              values: [250, 500]
                            - axisIndex: 1
                              axisId: "A2"
                              title: { ua: "Аромат", en: "Аромат" }
                              type: "select"
                              unit: null
                              values: ["rose", "mint", "citrus"]
                        offers: []
                        ui:
                          variationAxes:
                            - axisId: "A1"
                              title: { ua: "Обʼєм", en: "Объём" }
                              type: "number"
                              unit: "ml"
                              valuesPreset: [250, 500]
                            - axisId: "A2"
                              title: { ua: "Аромат", en: "Аромат" }
                              type: "select"
                              unit: null
