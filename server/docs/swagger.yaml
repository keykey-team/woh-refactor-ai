        isSale: { type: boolean, example: false }

    # =========================================================
    # РАСШИРЕНИЕ существующих схем (backward compatible)
    # =========================================================
    # ВАЖНО:
    # OpenAPI не умеет "дополнять" существующую схему напрямую в YAML без allOf.
    # Поэтому ниже — расширенные версии, которые ты можешь:
    #   A) либо реально заменить в исходнике (в схемах CatalogCard и ProductGroupDetails),
    #   B) либо оставить как отдельные *v2* DTO.
    #
    # Я оставляю как отдельные, чтобы не ломать текущие ссылки.
    # Если хочешь — я скажу точечно, что заменить.
    CatalogCardV2:
      allOf:
        - $ref: "#/components/schemas/CatalogCard"
        - type: object
          properties:
            status: { type: string, example: "active" }
            images:
              type: array
              items: { $ref: "#/components/schemas/ImageItem" }
              description: Галерея для карточки (если нужно).
            flags: { $ref: "#/components/schemas/ProductFlags" }
          description: |
            Расширенная карточка каталога.
            Добавляет:
              - status
              - images[]
              - flags (new/hit/sale)

    ProductGroupDetailsV2:
      allOf:
        - $ref: "#/components/schemas/ProductGroupDetails"
        - type: object
          properties:
            description: { $ref: "#/components/schemas/LocalizedText" }
            seo: { $ref: "#/components/schemas/SeoMeta" }
            images:
              type: array
              items: { $ref: "#/components/schemas/ImageItem" }
            flags: { $ref: "#/components/schemas/ProductFlags" }
          description: |
            Расширенная PDP-модель.
            Добавляет:
              - description (ua/en)
              - seo
              - images[]
              - flags

    # =========================================================
    # ДОП: стандартизация фасетов (исправление примера с characteristics.color)
    # =========================================================
    FacetsResponseV2:
      type: object
      description: |
        Нормализованный формат фасетов.

        В твоей базовой схеме FacetsResponse.characteristics = map(key -> FacetBucket[]).
        Это удобно и просто.

        В PART 3 я показал пример "color: { buckets: [...] }" — так делать НЕ надо,
        потому что не совпадает со схемой. Здесь — корректный вариант.
      properties:
        pricing:
          type: object
          properties:
            min: { type: number, nullable: true, example: 120 }
            max: { type: number, nullable: true, example: 1990 }
            currency: { type: string, example: "UAH" }
        variationAxes:
          type: object
          additionalProperties:
            type: array
            items: { $ref: "#/components/schemas/FacetBucket" }
        characteristics:
          type: object
          additionalProperties:
            type: array
            items: { $ref: "#/components/schemas/FacetBucket" }

    # =========================================================
