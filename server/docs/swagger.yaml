          - пресеты значений (valuesPreset)
          - видимость в фильтре (filterable)
          - поиск по характеристике (searchable)

        Важно:
          - meta.key — это тот же ключ, что используется в ProductGroup.characteristics[].key
          - meta.type определяет формат фильтра
          - valuesPreset — подсказки для UI (не обязаны быть полными)
