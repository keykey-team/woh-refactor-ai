  # =========================================================
  # Каталог: PDP (details)
  # =========================================================
  /catalog/groups/{slug}:
    get:
      tags: [Каталог]
      summary: Получить страницу товара (ProductGroup) по slug
      description: |
        Возвращает детальную страницу товара (PDP):
          - поля ProductGroup
          - variationAxes (оси вариаций)
          - characteristics (характеристики)
          - offers (все SKU)
          - агрегированную цену/наличие

        Использование на фронте:
          1) Открыли PDP по slug
          2) Отрисовали UI осей variationAxes
          3) Пользователь выбирает опции
          4) На add-to-cart делаем /offers/resolve для получения offer
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          example: "shampoo-keratin-pro"
      responses:
        "200":
          description: Детали ProductGroup
          content:
            application/json:
              schema:
                type: object
                properties:
                  item: { $ref: "#/components/schemas/ProductGroupDetails" }
              examples:
                ПримерPDP:
                  value:
                    item:
                      _id: "G100"
                      slug: "shampoo-keratin-pro"
                      title: { ua: "Шампунь Keratin Pro", en: "Шампунь Keratin Pro" }
                      description:
                        ua: "Професійний шампунь для відновлення волосся."
                        en: "Профессиональный шампунь для восстановления волос."
                      seo:
                        title: { ua: "Keratin Pro — шампунь", en: "Keratin Pro — шампунь" }
                        description:
                          ua: "Купити Keratin Pro з доставкою по Україні."
                          en: "Купить Keratin Pro с доставкой по Украине."
                        keywords: ["keratin", "shampoo"]
                      imageURL: "https://cdn.site/demo/shampoo/cover.webp"
                      images:
                        - url: "https://cdn.site/demo/shampoo/cover.webp"
                          alt: { ua: "Обкладинка", en: "Обложка" }
                          sort: 10
                        - url: "https://cdn.site/demo/shampoo/250-rose-bottle.webp"
                          alt: { ua: "250 мл пляшка", en: "250 мл бутылка" }
                          sort: 20
                      categoryIds: ["C3"]
                      status: "active"
                      flags: { isNew: true, isHit: false, isSale: false }
                      variationAxes:
                        - axisId: "A1"
                          title: { ua: "Обʼєм", en: "Объём" }
                          type: "number"
                          unit: "ml"
                          valuesPreset: [250, 500]
                        - axisId: "A2"
                          title: { ua: "Аромат", en: "Аромат" }
                          type: "select"
                          unit: null
                          valuesPreset: ["rose", "mint", "citrus"]
                        - axisId: "A3"
                          title: { ua: "Формат", en: "Формат" }
                          type: "select"
                          unit: null
                          valuesPreset: ["bottle", "refill"]
                      characteristics:
                        - key: "brand"
                          type: "select"
                          unit: null
                          value: "KeratinPro"
                          values: []
                        - key: "sulfate_free"
                          type: "boolean"
                          unit: null
                          value: true
                          values: []
                        - key: "hair_type"
                          type: "multiselect"
                          unit: null
                          value: null
                          values: ["dry", "damaged"]
                        - key: "color"
                          type: "select"
                          unit: null
                          value: "orange"
                          values: []
                      pricing: { min: 360, max: 610, currency: "UAH" }
                      availability: { hasAvailable: true, variantsCount: 12 }
                      offers:
                        - _id: "O1001"
                          groupId: "G100"
                          sku: "KPRO-250-ROSE-BTL"
                          price: 390
                          opt_price: null
                          available: true
                          img: "https://cdn.site/demo/shampoo/250-rose-bottle.webp"
                          optionValues: [250, "rose", "bottle"]
                          optionKey: "250|rose|bottle"
                        - _id: "O1002"
                          groupId: "G100"
                          sku: "KPRO-250-ROSE-RFL"
                          price: 360
                          opt_price: null
                          available: true
                          img: "https://cdn.site/demo/shampoo/250-rose-refill.webp"
                          optionValues: [250, "rose", "refill"]
                          optionKey: "250|rose|refill"
        "404":
          description: Не найдено
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              examples:
                NotFound:
                  value:
                    message: "ProductGroup не найден"
                    code: "NOT_FOUND"

  # =========================================================
  # Offers: resolve
  # =========================================================
  /catalog/offers/resolve:
    post:
      tags: [Офферы]
      summary: Определить Offer (SKU) по выбранным опциям
      description: |
        Используется на фронте при выборе вариаций на PDP и при добавлении в корзину.

        Передай groupId и ЛИБО:
          - optionValues: массив значений по осям variationAxes (по индексу)
          - optionKey: заранее собранный ключ

        ---------------------------------------------------------
        ✅ Как фронту собирать optionValues правильно
        ---------------------------------------------------------

        Пример variationAxes:
          0: A1 = Объём (number)
          1: A2 = Аромат (select)
          2: A3 = Формат (select)

        Тогда если пользователь выбрал:
          A1=250
          A2="rose"
          A3="bottle"

        optionValues будет:
          [250, "rose", "bottle"]

        ---------------------------------------------------------
        ✅ Рекомендация по optionKey
        ---------------------------------------------------------
        Собирай на сервере (в момент создания оффера) так:
          optionKey = optionValues.map(v => String(v)).join("|")

        Чтобы не было кавычек:
          "orange"|30  ❌
          orange|30    ✅

        ---------------------------------------------------------
        ✅ Доп. проверки
        ---------------------------------------------------------
        - если optionValues.length != variationAxes.length -> 400
        - если есть undefined в массиве -> 400
        - если типы не совпали (number vs string) -> 400 (по желанию)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OfferResolveRequest" }
            examples:
              ПоValues:
                value:
                  groupId: "G100"
                  optionValues: [250, "rose", "bottle"]
              ПоKey:
                value:
                  groupId: "G100"
                  optionKey: "250|rose|bottle"
              ПоValues_ТестЦветаOrange:
                value:
                  groupId: "G100"
                  optionValues: [250, "orange", "bottle"]
              ПоValues_ТестЦвета30:
                value:
                  groupId: "G100"
                  optionValues: [250, 30, "bottle"]
      responses:
        "200":
          description: Найденный Offer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OfferResolveResponse" }
              examples:
                Found:
                  value:
                    offer:
                      _id: "O1001"
                      groupId: "G100"
                      sku: "KPRO-250-ROSE-BTL"
                      price: 390
                      opt_price: null
                      available: true
                      img: "https://cdn.site/demo/shampoo/250-rose-bottle.webp"
                      optionValues: [250, "rose", "bottle"]
                      optionKey: "250|rose|bottle"
        "400":
          description: Ошибка запроса (не хватает optionValues/optionKey или неверный формат)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              examples:
                Missing:
                  value:
                    message: "Нужно передать optionValues или optionKey"
                    code: "BAD_REQUEST"
                WrongLength:
                  value:
                    message: "optionValues length must match variationAxes length"
                    code: "BAD_REQUEST"
                BadTypes:
                  value:
                    message: "optionValues types do not match variationAxes"
                    code: "BAD_REQUEST"
        "404":
          description: Offer не найден
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              examples:
                NotFound:
                  value:
                    message: "Offer не найден"
                    code: "NOT_FOUND"
# =========================
# PART 4/4 (FINAL)
