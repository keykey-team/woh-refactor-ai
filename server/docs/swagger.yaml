    # =========================================================
    HealthResponse:
      type: object
      properties:
        status: { type: string, example: "ok" }
        version: { type: string, example: "2.3.1" }
        time: { type: string, example: "2026-02-26T10:00:00Z" }
      required: [status]

    # =========================================================
    # ДОП: стандартизация ошибок валидации
    # =========================================================
    ValidationErrorDetails:
      type: object
      description: |
        Детализация ошибок валидации (какой параметр и что не так).
      properties:
        field: { type: string, example: "opt" }
        reason: { type: string, example: "Invalid JSON" }
        expected: { type: string, nullable: true, example: "object" }
        got: { type: string, nullable: true, example: "string" }

    ErrorResponseV2:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            details:
              type: object
              nullable: true
              properties:
                validation:
                  type: array
                  items: { $ref: "#/components/schemas/ValidationErrorDetails" }

