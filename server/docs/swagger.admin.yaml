                      - _id: 69aaf53efcc1f31d1fda65f4
                        sku: VITC-ORANGE-30-t003
                        price: 593
                        opt_price: null
                        available: true
                        img: https://i.postimg.cc/8k2LRmzP/fallback.webp
                        optionMap:
                          A1: orange
                          A2: 30
                        optionKey: orange|30
                        stocks:
                          - warehouseId: 69c470e7475b219c3e3255a0
                            onHand: 10
                            reserved: 0
                        updatedAt: '2026-03-25T23:34:00.500Z'
                    meta:
                      page: 1
                      limit: 50
                      total: 4
                      pages: 1
                full:
                  summary: Полный ответ по офферам
                  value:
                    items:
                      - _id: 69aaf53efcc1f31d1fda65f4
                        groupId: 69aaf53efcc1f31d1fda65ed
                        sku: VITC-ORANGE-30-t003
                        price: 593
                        opt_price: null
                        available: true
                        img: https://i.postimg.cc/8k2LRmzP/fallback.webp
                        optionMap:
                          A1: orange
                          A2: 30
                        optionValues:
                          - orange
                          - 30
                        optionKey: orange|30
                        stocks:
                          - warehouseId: 69c470e7475b219c3e3255a0
                            onHand: 10
                            reserved: 0
                        characteristics:
                          - key: tags
                            type: multiselect
                            unit: null
                            value: null
                            values:
                              - value: new
                                label:
                                  ua: Новинка
                                  en: Новинка
                        createdAt: '2026-03-06T15:39:42.311Z'
                        updatedAt: '2026-03-25T23:34:00.500Z'
                    meta:
                      page: 1
                      limit: 50
                      total: 4
                      pages: 1
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
