      description: |
        Возвращает список статей.

        Поддерживает:
        - пагинацию
        - поиск по заголовку или slug
        - фильтр по публикации
        - сортировку

        Поиск выполняется по:
        - title.ua
        - title.en
        - slug
      parameters:
        - name: page
          in: query
          required: false
          description: Номер страницы
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: Размер страницы
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: q
          in: query
          required: false
          description: Поиск по title/slуг
          schema:
            type: string
        - name: search
          in: query
          required: false
          description: Альтернативный параметр поиска
          schema:
            type: string
        - name: isPublished
          in: query
          required: false
          description: Фильтр по опубликованности
          schema:
            type: boolean
        - name: published
          in: query
          required: false
          description: Альтернативный фильтр по опубликованности
          schema:
            type: boolean
        - name: sort
          in: query
          required: false
          description: |
            Сортировка.
            Поддерживаемые значения:
            - -createdAt
            - createdAt
            - -publishedAt
            - publishedAt
            - title.ua
            - -title.ua
          schema:
            type: string
            default: '-createdAt'
        - name: select
          in: query
          required: false
          description: Список полей через пробел
          schema:
            type: string
      responses:
        '200':
          description: Список статей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleListResponse'
    post:
      tags:
        - Blog Admin
      summary: Создать статью
      description: >
        Создаёт новую статью.


        Особенности:

        - если `slug` не передан, он генерируется из `title.ua`

        - если `slug` занят, backend делает его уникальным

        - если `isPublished=true` и `publishedAt` не передан, дата публикации
        проставляется автоматически

        - `tags` можно передавать как массив строк или строку через запятую
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleCreateRequest'
            examples:
              basic:
                summary: Создание статьи
                value:
                  title:
                    ua: Як доглядати за танцювальним взуттям
                    en: How to care for dance shoes
                  slug: yak-doglyadaty-za-tantsyuvalnym-vzuttyam
                  excerpt:
                    ua: >-
                      Короткий гід по догляду за взуттям для тренувань і
                      виступів.
                    en: >-
                      A short guide on caring for shoes for training and
                      performance.
                  body:
                    ua: <p>Повний текст статті українською.</p>
                    en: <p>Full article text in English.</p>
                  cover:
                    url: https://cdn.example.com/blog/care-cover.jpg
                    preview: https://cdn.example.com/blog/previews/care-cover.jpg
                    alt:
                      ua: Догляд за танцювальним взуттям
                      en: Dance shoes care
                  publishedAt: '2026-04-17T12:00:00.000Z'
                  isPublished: true
                  tags:
                    - догляд
                    - взуття
                    - high heels
                  seo:
                    title:
                      ua: Як доглядати за танцювальним взуттям
                      en: How to care for dance shoes
                    description:
                      ua: Поради по догляду за взуттям для виступів та тренувань.
                      en: >-
                        Tips on caring for shoes used in performances and
                        training.
      responses:
        '201':
          description: Статья создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleItem'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
