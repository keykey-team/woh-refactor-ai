openapi: 3.1.0
info:
  title: Admin Catalog API
  version: 1.0.0
  summary: API админки для управления группами товаров и офферами
  description: >
    # Подробная документация для фронтенда


    Данный API предназначен для управления каталогом в админке.


    Архитектура каталога разделена на 2 сущности:


    1. **Группа товара** (`ProductGroup`)   Это общая сущность товара:   -
    slug   - title   - subtitle   - description   - imageURL
       - categoryIds
       - status
       - variationAxes
       - characteristics

    2. **Оффер** (`Offer`)   Это конкретная вариация товара внутри группы:   -
    sku   - price   - opt_price   - available   - img
       - optionMap
       - optionValues
       - optionKey
       - characteristics
       - stocks

    ---


    ## Важнейшая концепция


    ### variationAxes

    На уровне группы задаются оси вариаций.


    Пример:

    - `A1` = вкус

    - `A2` = количество

    - `A3` = формат упаковки


    ### optionMap

    У каждого оффера есть `optionMap`, который хранит выбранные значения по всем
    осям.


    Пример:

    ```json

    {  "A1": "berry",  "A2": 60,  "A3": "box"

    }

    ```


    ### Что фронт НЕ должен сам вычислять

    Бэкенд автоматически строит:

    - `optionValues`

    - `optionKey`


    Поэтому при создании/обновлении фронт **не должен** присылать:

    - `optionValues`

    - `optionKey`


    Фронт присылает:

    - `optionMap`

    - остальные поля оффера


    ---


    ## Рекомендованная стратегия интеграции фронта


    Если у товара может быть 100, 200, 400 и более офферов, **нельзя** строить
    UX как одну гигантскую форму,

    в которой всё грузится и сохраняется целиком при каждом изменении.


    Правильная схема:


    1. Открываем страницу редактирования товара

    2. Грузим данные группы отдельно:   `GET
    /catalog/admin/catalog/groups/{groupId}`

    3. Грузим офферы отдельно, с пагинацией:   `GET
    /catalog/admin/catalog/groups/{groupId}/offers?page=1&limit=50&compact=true`

    4. При изменении одного оффера используем:   - `PATCH
    /catalog/admin/catalog/offers/{offerId}`   - или специализированные PATCH
    endpoints

    5. Полный `PUT /catalog/admin/catalog/groups/{groupId}` используем только
    тогда, когда реально нужна   полная пересборка матрицы офферов, например:  
    - изменение variationAxes   - массовая генерация/удаление офферов   - импорт
    большой матрицы


    ---


    ## Когда использовать какой endpoint


    ### Создание группы

    `POST /catalog/admin/catalog/groups`


    Используется когда создается новая группа товара.

    Можно передать:

    - группу без офферов

    - группу с несколькими офферами

    - группу с полной матрицей офферов


    ### Получение группы

    `GET /catalog/admin/catalog/groups/{groupId}`


    Используется для загрузки формы товара.

    По умолчанию лучше не тянуть офферы внутри этого ответа.


    ### Полное обновление группы + офферов

    `PUT /catalog/admin/catalog/groups/{groupId}`


    Использовать только когда нужно заменить/пересобрать **всю** матрицу
    офферов.


    Очень важно:

    - это тяжелый запрос

    - нужно передавать **полное актуальное состояние**

    - офферы, которых нет в payload, могут быть удалены


    ### Частичное обновление только группы

    `PATCH /catalog/admin/catalog/groups/{groupId}`


    Использовать, если меняются только поля группы:

    - title

    - subtitle

    - description

    - status

    - imageURL

    - categoryIds

    - characteristics

    - slug


    Нельзя использовать для:

    - variationAxes

    - offers


    ### Получение офферов группы

    `GET /catalog/admin/catalog/groups/{groupId}/offers`


    Основной endpoint для таблицы офферов в админке.

    Поддерживает:

    - пагинацию

    - поиск

    - compact режим

    - фильтрацию по available


    ### Создание одного оффера

    `POST /catalog/admin/catalog/groups/{groupId}/offers`


    Используется, если нужно добавить один новый оффер без полного
    пересохранения всей группы.


    ### Частичное обновление одного оффера

    `PATCH /catalog/admin/catalog/offers/{offerId}`


    Используется, если нужно обновить один оффер:

    - sku

    - price

    - opt_price

    - available

    - img

    - optionMap

    - characteristics

    - stocks


    ### Быстрые PATCH endpoints

    Использовать для inline-редактирования таблицы:

    - `PATCH /catalog/admin/catalog/offers/{offerId}/availability`

    - `PATCH /catalog/admin/catalog/offers/{offerId}/price`

    - `PATCH /catalog/admin/catalog/offers/{offerId}/stocks`


    ### Удаление одного оффера

    `DELETE /catalog/admin/catalog/offers/{offerId}`


    ---


    ## Оптимизация фронта при 400+ офферах


    ### Обязательно

    - не хранить 400+ офферов в одном огромном form state, если это не bulk
    editor

    - использовать серверную пагинацию

    - для таблицы использовать `compact=true`

    - для быстрого редактирования использовать PATCH endpoints

    - использовать debounce для поиска

    - использовать виртуализацию таблицы, если рендерите большие списки

    - не делать full PUT ради изменения цены у одного оффера


    ### Рекомендуемые размеры страниц

    - default: `50`

    - комфортно: `50–100`

    - максимум с осторожностью: `200`


    ### Рекомендуемый UX

    - верх страницы: форма группы

    - низ страницы: таблица офферов

    - таблица офферов грузится отдельным запросом

    - изменение строки таблицы делает PATCH только этой строки

    - изменение variationAxes переводит экран в режим полной пересборки


    ### Когда `compact=true`

    Используйте `compact=true`, если нужно:

    - показать список офферов в таблице

    - отрисовать минимальный набор полей

    - ускорить загрузку

    - не тянуть тяжелые characteristics, если они не нужны в таблице


    ---


    ## Важные правила для фронта


    ### Правило 1

    Если изменились `variationAxes`, старые офферы в прежнем виде больше
    невалидны,

    если у них нет значений для новых осей.


    Пример:

    было:

    - A1

    - A2


    стало:

    - A1

    - A2

    - A3


    Тогда каждый оффер должен иметь:

    ```json

    {  "optionMap": {    "A1": "...",    "A2": "...",    "A3": "..."  }

    }

    ```


    ### Правило 2

    При `PUT /groups/{groupId}` фронт должен отправлять **полное** состояние
    группы и офферов, а не только изменения.


    ### Правило 3

    При `PATCH /groups/{groupId}` нельзя передавать `variationAxes` и `offers`.


    ### Правило 4

    При `PATCH /offers/{offerId}` если меняется `optionMap`, backend:

    - пересоберет `optionValues`

    - пересоберет `optionKey`

    - проверит уникальность новой комбинации


    ### Правило 5

    SKU должен быть уникален глобально.


    ### Правило 6

    Комбинация вариаций внутри группы должна быть уникальна.

    То есть два оффера не могут иметь одинаковый `optionMap`, дающий один и тот
    же `optionKey`.
servers:
  - url: http://localhost:5007/v1
    description: Локальный сервер разработки
tags:
  - name: Admin Categories Read
    description: Чтение категорий каталога в админке
  - name: Admin Categories Write
    description: Создание, обновление и удаление категорий в админке
  - name: Admin Catalog Groups
    description: Управление группами товаров
  - name: Admin Catalog Offers
    description: Управление офферами товаров
paths:
  /catalog/admin/categories/tree:
    get:
      tags:
        - Admin Categories Read
      summary: Получить дерево категорий
      description: |
        Возвращает полное дерево категорий.
      parameters:
        - name: status
          in: query
          required: false
          description: Фильтр по статусу категории
          schema:
            $ref: '#/components/schemas/CategoryStatus'
      responses:
        '200':
          description: Дерево категорий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryTreeResponse'
              examples:
                success:
                  value:
                    items:
                      - _id: 6.8e+23
                        parentId: null
                        slug: skin-structure
                        title:
                          ua: Догляд за шкірою
                          en: Skin Care
                        description:
                          ua: Категорія для щоденного догляду
                          en: Category for daily care
                        path:
                          - skin-structure
                        fullSlug: skin-structure
                        ancestors: []
                        level: 0
                        status: active
                        sort: 10
                        children:
                          - _id: 6.8e+23
                            parentId: 6.8e+23
                            slug: cleansing
                            title:
                              ua: Очищення
                              en: Cleansing
                            description:
                              ua: Пінки, гелі, муси
                              en: Foams, gels, mousses
                            path:
                              - skin-structure
                              - cleansing
                            fullSlug: skin-structure/cleansing
                            ancestors:
                              - 6.8e+23
                            level: 1
                            status: active
                            sort: 20
                            children: []
        '400':
          $ref: '#/components/responses/BadRequest'
  /catalog/admin/categories/children:
    get:
      tags:
        - Admin Categories Read
      summary: Получить детей категории
      description: |
        Возвращает дочерние категории по parentId.
        Если parentId не передан, возвращаются корневые категории.
      parameters:
        - name: parentId
          in: query
          required: false
          description: ObjectId родительской категории
          schema:
            $ref: '#/components/schemas/ObjectIdString'
        - name: status
          in: query
          required: false
          description: Фильтр по статусу категории
          schema:
            $ref: '#/components/schemas/CategoryStatus'
      responses:
        '200':
          description: Список категорий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryFlatListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /catalog/admin/categories/breadcrumbs:
    get:
      tags:
        - Admin Categories Read
      summary: Получить breadcrumbs категории
      description: |
        Возвращает цепочку категорий от корня до текущей.
      parameters:
        - name: categoryId
          in: query
          required: true
          description: ObjectId категории
          schema:
            $ref: '#/components/schemas/ObjectIdString'
      responses:
        '200':
          description: Цепочка breadcrumb
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryFlatListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /catalog/admin/categories/by-path:
    get:
      tags:
        - Admin Categories Read
      summary: Найти категорию по path
      description: |
        Находит категорию по строковому path.
        Пример: skin-structure/cleansing/foam
      parameters:
        - name: path
          in: query
          required: true
          description: Путь категории
          schema:
            type: string
          example: skin-structure/cleansing
        - name: status
          in: query
          required: false
          description: Фильтр по статусу категории
          schema:
            $ref: '#/components/schemas/CategoryStatus'
      responses:
        '200':
          description: Категория найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryItemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /catalog/admin/categories/by-fullslug:
    get:
      tags:
        - Admin Categories Read
      summary: Найти категорию по fullSlug
      description: |
        Явный endpoint для поиска категории по полному slug.
      parameters:
        - name: fullSlug
          in: query
          required: true
          description: Полный slug категории
          schema:
            type: string
          example: skin-structure/cleansing
        - name: status
          in: query
          required: false
          description: Фильтр по статусу категории
          schema:
            $ref: '#/components/schemas/CategoryStatus'
      responses:
        '200':
          description: Категория найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryItemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /catalog/admin/categories/subtree:
    get:
      tags:
        - Admin Categories Read
      summary: Получить поддерево категории по path
      description: |
        Возвращает узел категории и всё вложенное поддерево.
      parameters:
        - name: path
          in: query
          required: true
          description: Путь категории
          schema:
            type: string
          example: skin-structure/cleansing
        - name: status
          in: query
          required: false
          description: Фильтр по статусу категории
          schema:
            $ref: '#/components/schemas/CategoryStatus'
      responses:
        '200':
          description: Поддерево категории
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategorySubtreeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /catalog/admin/categories/export.csv:
    get:
      tags:
        - Admin Categories Read
      summary: Экспорт категорий в CSV
      description: |
        Экспортирует список категорий в CSV.
      parameters:
        - name: status
          in: query
          required: false
          description: Фильтр по статусу категории
          schema:
            $ref: '#/components/schemas/CategoryStatus'
      responses:
        '200':
          description: CSV файл с категориями
          content:
            text/csv:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
  /catalog/admin/categories/export.xlsx:
    get:
      tags:
        - Admin Categories Read
      summary: Экспорт категорий в XLSX
      description: |
        Экспортирует список категорий в XLSX.
      parameters:
        - name: status
          in: query
          required: false
          description: Фильтр по статусу категории
          schema:
            $ref: '#/components/schemas/CategoryStatus'
      responses:
        '200':
          description: XLSX файл с категориями
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
  /catalog/admin/categories:
    post:
      tags:
        - Admin Categories Write
      summary: Создать категорию
      description: |
        Создает новую категорию.

        Backend сам рассчитывает:
        - path
        - fullSlug
        - ancestors
        - level
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
            examples:
              rootCategory:
                summary: Создание корневой категории
                value:
                  parentId: null
                  slug: skin-structure
                  title:
                    ua: Догляд за шкірою
                    en: Skin Care
                  description:
                    ua: Категорія для догляду за шкірою
                    en: Category for skin care
                  status: active
                  sort: 10
              childCategory:
                summary: Создание дочерней категории
                value:
                  parentId: 6.8e+23
                  slug: cleansing
                  title:
                    ua: Очищення
                    en: Cleansing
                  description:
                    ua: Пінки, гелі, муси
                    en: Foams, gels, mousses
                  status: active
                  sort: 20
      responses:
        '201':
          description: Категория успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryMutationResponse'
              examples:
                created:
                  value:
                    ok: true
                    item:
                      _id: 6.8e+23
                      parentId: 6.8e+23
                      slug: cleansing
                      title:
                        ua: Очищення
                        en: Cleansing
                      description:
                        ua: Пінки, гелі, муси
                        en: Foams, gels, mousses
                      path:
                        - skin-structure
                        - cleansing
                      fullSlug: skin-structure/cleansing
                      ancestors:
                        - 6.8e+23
                      level: 1
                      status: active
                      sort: 20
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /catalog/admin/categories/{id}:
    put:
      tags:
        - Admin Categories Write
      summary: Обновить категорию
      description: |
        Обновляет категорию.

        Можно менять:
        - parentId
        - slug
        - title
        - description
        - status
        - sort

        Backend пересчитывает path/fullSlug/ancestors/level
        и обновляет потомков при переносе/переименовании узла.
      parameters:
        - name: id
          in: path
          required: true
          description: Mongo ObjectId категории
          schema:
            $ref: '#/components/schemas/ObjectIdString'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
            examples:
              renameAndSort:
                summary: Переименование категории и изменение sort
                value:
                  slug: facial-cleansing
                  title:
                    ua: Очищення обличчя
                    en: Facial Cleansing
                  description:
                    ua: Засоби для делікатного очищення
                    en: Products for gentle cleansing
                  status: active
                  sort: 30
              moveCategory:
                summary: Перемещение категории под нового родителя
                value:
                  parentId: 6.8e+23
                  status: hidden
      responses:
        '200':
          description: Категория успешно обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryMutationResponse'
              examples:
                updated:
                  value:
                    ok: true
                    item:
                      _id: 6.8e+23
                      parentId: 6.8e+23
                      slug: facial-cleansing
                      title:
                        ua: Очищення обличчя
                        en: Facial Cleansing
                      description:
                        ua: Засоби для делікатного очищення
                        en: Products for gentle cleansing
                      path:
                        - face-care
                        - facial-cleansing
                      fullSlug: face-care/facial-cleansing
                      ancestors:
                        - 6.8e+23
                      level: 1
                      status: hidden
                      sort: 30
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags:
        - Admin Categories Write
      summary: Удалить категорию
      description: |
        Удаляет категорию.

        Ограничение:
        категорию нельзя удалить, если у нее есть дети.
      parameters:
        - name: id
          in: path
          required: true
          description: Mongo ObjectId категории
          schema:
            $ref: '#/components/schemas/ObjectIdString'
      responses:
        '200':
          description: Категория успешно удалена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
              examples:
                success:
                  value:
                    ok: true
        '400':
          $ref: '#/components/responses/BadRequest'
  /catalog/admin/catalog/groups:
    get:
      tags:
        - Admin Catalog Groups
      summary: Получить список групп товаров
      description: >
        Возвращает пагинированный список групп товаров для админки.


        - список товаров в админке

        - поиск товаров

        - фильтрация по статусу

        - фильтрация по категории


        Этот endpoint не возвращает массив офферов, потому что это сильно
        утяжеляет ответ.


        Поиск `q` выполняется по:

        - slug

        - title.ua

        - title.en

        - subtitle.ua

        - subtitle.en


        Использовать этот endpoint для:

        - страницы списка товаров

        - модального выбора товара

        - поиска нужной группы
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/GroupsLimitParam'
        - name: q
          in: query
          required: false
          description: Общий текстовый поиск по slug/title/subtitle
          schema:
            type: string
          examples:
            slug:
              summary: Поиск по slug
              value: vitamin-c
            title:
              summary: Поиск по названию
              value: ліпосомальний
        - name: status
          in: query
          required: false
          description: Фильтр по статусу группы
          schema:
            $ref: '#/components/schemas/GroupStatus'
          examples:
            active:
              value: active
            hidden:
              value: hidden
        - name: categoryId
          in: query
          required: false
          description: ObjectId категории
          schema:
            $ref: '#/components/schemas/ObjectIdString'
      responses:
        '200':
          description: Список групп успешно получен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminGroupListResponse'
              examples:
