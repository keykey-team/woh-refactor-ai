  /inventory/admin/inventory/intake:
    post:
      tags:
        - Inventory Admin
      summary: Оприходование остатков
      description: >
        Увеличивает остатки `onHand` на одном или нескольких складах.


        Логика warehouseId:

        - если у item указан `warehouseId`, используется он

        - если у item нет `warehouseId`, используется верхнеуровневый
        `warehouseId`

        - если нет ни там ни там, backend вернёт ошибку


        Для каждого item:

        - находится offer

        - находится или создаётся строка stocks для warehouseId

        - увеличивается onHand

        - обновляется purchasePrice

        - создаётся StockDocument типа `incoming`

        - создаются StockMovement типа `incoming`


        Таким образом один запрос может:

        - оприходовать всё на один склад

        - оприходовать разные товары на разные склады
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryIntakeRequest'
            examples:
              one_warehouse:
                summary: Оприходование на один склад
                value:
                  warehouseId: '680000000000000000000201'
                  currency: UAH
                  comment: Поставка від постачальника
                  items:
                    - offerId: '680000000000000000000111'
                      qty: 100
                      purchasePrice: 320
                      catalogPrice: 450
                      comment: Партія 1
                    - offerId: '680000000000000000000112'
                      qty: 10
                      purchasePrice: 500
                      catalogPrice: 700
                      comment: ''
              multi_warehouse:
                summary: Оприходование на разные склады
                value:
                  currency: UAH
                  comment: Масове оприбуткування
                  items:
                    - offerId: '680000000000000000000111'
                      warehouseId: '680000000000000000000201'
                      qty: 10
                      purchasePrice: 300
                      catalogPrice: 450
                      comment: Київ
                    - offerId: '680000000000000000000112'
                      warehouseId: '680000000000000000000202'
                      qty: 5
                      purchasePrice: 500
                      catalogPrice: 700
                      comment: Львів
      responses:
        '201':
          description: Оприходование выполнено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryOperationResponse'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /inventory/admin/inventory/stocktake:
    post:
      tags:
        - Inventory Admin
      summary: Инвентаризация остатков
      description: >
        Устанавливает фактическое количество `onHand` на одном или нескольких
        складах.


        Логика warehouseId:

        - если у item указан `warehouseId`, используется он

        - если у item нет `warehouseId`, используется верхнеуровневый
        `warehouseId`

        - если нет ни там ни там, backend вернёт ошибку


        Для каждого item:

        - находится offer

        - находится или создаётся строка stocks для warehouseId

        - onHand устанавливается в factQty

        - reserved автоматически ограничивается сверху значением onHand

        - создаётся StockDocument типа `stocktake`

        - создаются StockMovement типа `stocktake`


        Таким образом один запрос может:

        - провести инвентаризацию одного склада

        - провести массовую инвентаризацию разных складов
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryStocktakeRequest'
            examples:
              one_warehouse:
                summary: Инвентаризация одного склада
                value:
                  warehouseId: '680000000000000000000201'
                  currency: UAH
                  comment: Планова інвентаризація
                  items:
                    - offerId: '680000000000000000000111'
                      factQty: 97
                      comment: Виявлено розбіжність
                    - offerId: '680000000000000000000112'
                      factQty: 10
                      comment: ''
              multi_warehouse:
                summary: Инвентаризация по разным складам
                value:
                  currency: UAH
                  comment: Масова інвентаризація
                  items:
                    - offerId: '680000000000000000000111'
                      warehouseId: '680000000000000000000201'
                      factQty: 12
                      comment: Київ
                    - offerId: '680000000000000000000111'
                      warehouseId: '680000000000000000000202'
                      factQty: 5
                      comment: Львів
                    - offerId: '680000000000000000000112'
                      warehouseId: '680000000000000000000203'
                      factQty: 3
                      comment: ''
      responses:
        '201':
          description: Инвентаризация выполнена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryOperationResponse'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /inventory/admin/inventory/transfer:
    post:
      tags:
        - Inventory Admin
      summary: Перемещение остатков между складами
      description: >
        Перемещает остатки между складами.


        Логика складов:

        - если у item указаны `fromWarehouseId` и `toWarehouseId`, используются
        они

        - если у item они не указаны, используются верхнеуровневые
        `fromWarehouseId` и `toWarehouseId`

        - если не удаётся определить склад-источник или склад-получатель,
        backend вернёт ошибку


        Для каждого item:

        - уменьшается onHand на складе-источнике

        - увеличивается onHand на складе-получателе

        - reserved не меняется

        - создаётся StockDocument типа `transfer`

        - создаются два StockMovement:  - `transfer_out`  - `transfer_in`


        Важно:

        - нельзя перемещать больше, чем доступно (`onHand - reserved`) на
        складе-источнике

        - fromWarehouseId и toWarehouseId должны быть разными


        Таким образом один запрос может:

        - переместить всё по одному маршруту

        - переместить разные товары по разным маршрутам
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryTransferRequest'
            examples:
              one_route:
                summary: Перемещение по одному маршруту
                value:
                  fromWarehouseId: '680000000000000000000201'
                  toWarehouseId: '680000000000000000000202'
                  currency: UAH
                  comment: Переміщення на київський склад
                  items:
                    - offerId: '680000000000000000000111'
                      qty: 20
                      comment: ''
                    - offerId: '680000000000000000000112'
                      qty: 5
                      comment: ''
              multi_route:
                summary: Перемещение по разным маршрутам
                value:
                  currency: UAH
                  comment: Складні переміщення
                  items:
