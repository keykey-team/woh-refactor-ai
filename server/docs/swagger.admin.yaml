  /catalog/admin/catalog/groups/{groupId}/offers:
    get:
      tags:
        - Admin Catalog Offers
      summary: Получить офферы группы с пагинацией
      description: |
        Основной endpoint для таблицы офферов в админке.

        Это главный endpoint для товаров с большим количеством офферов.

        - пагинацию
        - фильтрацию по available
        - поиск по sku
        - общий поиск по sku и optionKey
        - compact режим

        - использовать `limit=50` по умолчанию
        - использовать `compact=true` для списка/таблицы
        - использовать `sku`, если нужно найти конкретный оффер по SKU
        - использовать `q`, если нужен общий поиск
        - не грузить все 400+ офферов сразу без необходимости

        - `sku` — точечный/почти точечный поиск по SKU
        - `q` — более общий текстовый поиск по `sku` и `optionKey`
      parameters:
        - $ref: '#/components/parameters/GroupIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/OffersLimitParam'
        - name: q
          in: query
          required: false
          description: Общий поиск по sku или optionKey
          schema:
            type: string
          examples:
            optionKey:
              value: berry|60
        - name: sku
          in: query
          required: false
          description: Поиск по SKU
          schema:
            type: string
          examples:
            exactSku:
              value: VITC-BERRY-60-BOX-t003
        - name: available
          in: query
          required: false
          description: Фильтр по доступности
          schema:
            type: boolean
        - name: compact
          in: query
          required: false
          description: Возвращать облегченный ответ для таблицы
          schema:
            type: boolean
            default: false
