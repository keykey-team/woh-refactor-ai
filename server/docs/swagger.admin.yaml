    patch:
      tags:
        - Blog Admin
      summary: Обновить статью
      description: >
        Частично обновляет статью по `_id` или `slug`.


        Особенности:

        - можно передавать только изменившиеся поля

        - если передан новый `slug`, backend сделает его уникальным

        - если `slug` не передан, но изменился `title.ua`, backend может
        пересчитать slug

        - `tags` можно передавать как массив строк или как строку через запятую
      parameters:
        - name: idOrSlug
          in: path
          required: true
          description: ObjectId статьи или slug статьи
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleUpdateRequest'
            examples:
              update_text:
                summary: Обновить заголовок и текст
                value:
                  title:
                    ua: Оновлений заголовок статті
                    en: Updated article title
                  excerpt:
                    ua: Оновлений короткий опис.
                    en: Updated short description.
                  body:
                    ua: <p>Оновлений HTML текст українською.</p>
                    en: <p>Updated HTML text in English.</p>
              publish_article:
                summary: Опубликовать статью
                value:
                  isPublished: true
                  publishedAt: '2026-04-17T12:00:00.000Z'
              update_seo:
                summary: Обновить SEO
                value:
                  seo:
                    title:
                      ua: SEO заголовок статті
                      en: SEO article title
                    description:
                      ua: SEO опис статті
                      en: SEO article description
      responses:
        '200':
          description: Статья обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleItem'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Статья не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /articles/{id}:
    delete:
