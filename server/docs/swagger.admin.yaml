components:
  parameters:
    GroupIdPath:
      name: groupId
      in: path
      required: true
      description: Mongo ObjectId группы товара
      schema:
        $ref: '#/components/schemas/ObjectIdString'
    OfferIdPath:
      name: offerId
      in: path
      required: true
      description: Mongo ObjectId оффера
      schema:
        $ref: '#/components/schemas/ObjectIdString'
    PageParam:
      name: page
      in: query
      required: false
      description: Номер страницы, начиная с 1
      schema:
        type: integer
        minimum: 1
        default: 1
    GroupsLimitParam:
      name: limit
      in: query
      required: false
      description: Лимит для списка групп
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    OffersLimitParam:
      name: limit
      in: query
      required: false
      description: |
        Лимит для списка офферов.

        Рекомендация:
        - 50 по умолчанию
        - 100 если нужна чуть большая таблица
        - 200 только при осознанной необходимости
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
  responses:
    BadRequest:
      description: Ошибка валидации запроса
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidGroupId:
              value:
                message: Invalid groupId
                code: BAD_REQUEST
            invalidOfferId:
              value:
                message: Invalid offerId
                code: BAD_REQUEST
            invalidPayload:
              value:
                message: >-
                  offers[0].optionMap.A3 is required because this axis exists in
                  variationAxes
                code: BAD_REQUEST
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            groupNotFound:
              value:
                message: ProductGroup not found
                code: NOT_FOUND
            offerNotFound:
              value:
                message: Offer not found
                code: NOT_FOUND
    Conflict:
      description: Конфликт данных
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            duplicateSlug:
              value:
                message: Slug already exists
                code: CONFLICT
            duplicateSku:
              value:
                message: SKU already exists - VITC-BERRY-60-BOX-t003
                code: CONFLICT
            duplicateVariant:
              value:
                message: Variant combination already exists - berry|60|box
                code: CONFLICT
  schemas:
    ObjectIdString:
      type: string
      pattern: ^[a-fA-F0-9]{24}$
      examples:
        - 69aaf53efcc1f31d1fda65ed
    CategoryStatus:
      type: string
      enum:
        - active
        - hidden
      example: active
    GroupStatus:
      type: string
      enum:
        - active
        - draft
        - hidden
    LocalizedText:
      type: object
      additionalProperties: false
      required:
        - ua
        - en
      properties:
        ua:
          type: string
        en:
          type: string
      example:
        ua: Вітамін C
        en: Витамин C
    CategoryLocalizedText:
      type: object
      additionalProperties: false
      required:
        - ua
      properties:
        ua:
          type: string
        en:
          type: string
        ru:
          type: string
      example:
        ua: Очищення
        en: Cleansing
    CategoryNode:
      type: object
      required:
        - _id
        - parentId
        - slug
        - title
        - description
        - path
        - fullSlug
        - ancestors
        - level
        - status
        - sort
      properties:
        _id:
          $ref: '#/components/schemas/ObjectIdString'
        parentId:
          oneOf:
            - $ref: '#/components/schemas/ObjectIdString'
            - type: 'null'
          nullable: true
        slug:
          type: string
        title:
          $ref: '#/components/schemas/CategoryLocalizedText'
        description:
          $ref: '#/components/schemas/CategoryLocalizedText'
        path:
          type: array
          items:
            type: string
        fullSlug:
          type: string
        ancestors:
          type: array
          items:
            $ref: '#/components/schemas/ObjectIdString'
        level:
          type: integer
        status:
          $ref: '#/components/schemas/CategoryStatus'
        sort:
          type: number
    CategoryTreeNode:
      allOf:
        - $ref: '#/components/schemas/CategoryNode'
        - type: object
          required:
            - children
          properties:
            children:
              type: array
              items:
                $ref: '#/components/schemas/CategoryTreeNode'
    CategoryTreeResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CategoryTreeNode'
    CategoryFlatListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CategoryNode'
    CategoryItemResponse:
      type: object
      required:
        - item
      properties:
        item:
          $ref: '#/components/schemas/CategoryNode'
    CategorySubtreeResponse:
      type: object
      required:
        - item
      properties:
        item:
          $ref: '#/components/schemas/CategoryTreeNode'
    CreateCategoryRequest:
      type: object
      additionalProperties: false
      required:
        - slug
        - title
      properties:
        parentId:
          oneOf:
            - $ref: '#/components/schemas/ObjectIdString'
            - type: 'null'
          nullable: true
          description: null для корневой категории
        slug:
          type: string
          description: Локальный slug узла, не полный путь
          example: cleansing
        title:
          $ref: '#/components/schemas/CategoryLocalizedText'
        description:
          $ref: '#/components/schemas/CategoryLocalizedText'
        status:
          $ref: '#/components/schemas/CategoryStatus'
        sort:
          type: number
          default: 0
    UpdateCategoryRequest:
      type: object
      additionalProperties: false
      properties:
        parentId:
          oneOf:
            - $ref: '#/components/schemas/ObjectIdString'
            - type: 'null'
          nullable: true
        slug:
          type: string
        title:
          $ref: '#/components/schemas/CategoryLocalizedText'
        description:
          $ref: '#/components/schemas/CategoryLocalizedText'
        status:
          $ref: '#/components/schemas/CategoryStatus'
        sort:
          type: number
    CategoryMutationResponse:
      type: object
      required:
        - ok
        - item
      properties:
        ok:
          type: boolean
        item:
          $ref: '#/components/schemas/CategoryNode'
    CharacteristicType:
      type: string
      enum:
        - string
        - number
        - boolean
        - select
        - multiselect
    CharacteristicInput:
      type: object
      additionalProperties: false
      required:
        - key
        - type
      properties:
        key:
          type: string
          example: brand
        type:
          $ref: '#/components/schemas/CharacteristicType'
        unit:
          oneOf:
            - type: string
            - type: 'null'
          nullable: true
          example: caps
        value:
          nullable: true
          description: |
            Универсальное поле значения.

            Возможные реальные форматы:
            - строка
            - число
            - boolean
            - объект вида `{ value, label }`
            - локализованный объект, если бизнес-логика это допускает
        values:
          type: array
          items:
            nullable: true
          description: |
            Используется чаще всего для multiselect.
            Для остальных типов обычно пустой массив.
      description: |
        Универсальная структура характеристики.
        Используется и для группы, и для оффера.

        Примеры:

        ```json
        {
          "key": "brand",
          "type": "select",
          "unit": null,
          "value": {
            "value": "MST",
            "label": {
              "ua": "MST",
              "en": "MST"
            }
          },
          "values": []
        }
        ```

        ```json
        {
          "key": "tags",
          "type": "multiselect",
          "unit": null,
          "value": null,
          "values": [
            {
              "value": "new",
              "label": {
                "ua": "Новинка",
                "en": "Новинка"
              }
            }
          ]
        }
        ```
    VariationAxisInput:
      type: object
      additionalProperties: false
      required:
        - axisId
        - title
        - type
        - valuesPreset
      properties:
        axisId:
          type: string
          description: Стабильный идентификатор оси вариации
          example: A1
        title:
          $ref: '#/components/schemas/LocalizedText'
        type:
          type: string
          enum:
            - number
            - select
            - string
        unit:
          oneOf:
            - type: string
            - type: 'null'
          nullable: true
        valuesPreset:
          type: array
          items:
            nullable: true
      description: |
        Ось вариации на уровне группы.

        Пример:
        ```json
        {
          "axisId": "A2",
          "title": {
            "ua": "Кількість",
            "en": "Количество"
          },
          "type": "number",
          "unit": "caps",
          "valuesPreset": [30, 60]
        }
        ```
