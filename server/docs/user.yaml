openapi: 3.0.3
info:
  title: IAM API
  version: 1.0.0
  description: |
    API для авторизации, профиля пользователя, wishlist, cart, checkout,
    Monobank, Monobank Installments и заказов.

servers:
  - url: /v1/iam

tags:
  - name: Auth
  - name: User
  - name: Wishlist
  - name: Cart
  - name: Orders
  - name: Checkout
  - name: Payments
  - name: Webhooks

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LocalizedText:
      type: object
      additionalProperties: true
      example:
        ua: "Назва товару"
        en: "Название товара"

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    UserShort:
      type: object
      properties:
        id:
          type: string
          example: "67f2c5d1b9e12a0012345678"
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        middleName:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date-time
          nullable: true
        phone:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, blocked, pending]
        bonusBalance:
          type: number
        referralBalance:
          type: number
        referralCode:
          type: string
          nullable: true
        invitedBy:
          type: string
          nullable: true
        deliveryProvince:
          type: string
          nullable: true
        deliveryCity:
          type: string
          nullable: true
        deliveryPostOffice:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserShort'
        token:
          type: string
        expiresIn:
          type: integer
      required:
        - user
        - token
        - expiresIn

    AuthMeResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        middleName:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date-time
          nullable: true
        phone:
          type: string
          nullable: true
        deliveryProvince:
          type: string
          nullable: true
        deliveryCity:
          type: string
          nullable: true
        deliveryPostOffice:
          type: string
          nullable: true
        status:
          type: string
        bonusBalance:
          type: number
        referralBalance:
          type: number
        referralCode:
          type: string
          nullable: true
        invitedBy:
          type: string
          nullable: true
        cart:
          type: array
          items:
            $ref: '#/components/schemas/CartItemRaw'
        wishlist:
          type: array
          items:
            $ref: '#/components/schemas/ProductGroup'
        orders:
          type: array
          items:
            $ref: '#/components/schemas/UserOrderRef'
        createdAt:
          type: string
          format: date-time

    UserOrderRef:
      type: object
      properties:
        orderId:
          type: string
        orderNumber:
          type: number
        createdAt:
          type: string
          format: date-time
        total:
          type: number
        status:
          type: string

    ProductGroup:
      type: object
      additionalProperties: true
      description: |
        ProductGroup отдается как есть из Mongo. Структура может быть шире,
        чем описано здесь.
      properties:
        _id:
          type: string
        title:
          $ref: '#/components/schemas/LocalizedText'
        name:
          $ref: '#/components/schemas/LocalizedText'
        slug:
          type: string
        reviews:
          type: array
          items:
            type: object

    Offer:
      type: object
      additionalProperties: true
      description: |
        Offer отдается как есть из Mongo. Ниже указаны основные ожидаемые поля.
      properties:
        _id:
          type: string
        groupId:
          type: string
        sku:
          type: string
        integrationSku:
          type: string
        price:
          type: number
        effectivePrice:
          type: number
        discount:
          type: number
        quantity:
          type: number
        name:
          $ref: '#/components/schemas/LocalizedText'

    CartItemRaw:
      type: object
      properties:
        offerId:
          type: string
        qty:
          type: integer
        priceAtAdd:
          type: number
        groupId:
          type: string
          nullable: true
        sku:
          type: string
          nullable: true

    CartItemResponse:
      type: object
      properties:
        offerId:
          type: string
        qty:
          type: integer
        priceAtAdd:
          type: number
        offer:
          allOf:
            - $ref: '#/components/schemas/Offer'
          nullable: true
        group:
          allOf:
            - $ref: '#/components/schemas/ProductGroup'
          nullable: true

    OrderItem:
      type: object
      properties:
        offerId:
          type: string
        groupId:
          type: string
          nullable: true
        sku:
          type: string
          nullable: true
        optionKey:
          type: string
          nullable: true
        optionValues:
          type: array
          items: {}
        titleSnapshot:
          nullable: true
        imgSnapshot:
          type: string
          nullable: true
        qty:
          type: integer
        pricePerUnit:
          type: number
        subtotal:
          type: number

    Payment:
      type: object
      properties:
        payment_method_id:
          type: integer
        payment_method:
          type: string
        amount:
          type: number
        description:
          type: string
          nullable: true
        status:
          type: string
        invoiceId:
          type: string
          nullable: true
        pageUrl:
          type: string
          nullable: true
        monoPartsOrderId:
          type: string
          nullable: true
        partsCount:
          type: integer
          nullable: true
        sitniksOrderId:
          type: integer
          nullable: true
        monoPartsConfirmed:
          type: boolean
        monoPartsConfirmedAt:
          type: string
          format: date-time
          nullable: true
        monoPartsConfirmResponse:
          nullable: true

    SitniksInfo:
      type: object
      properties:
        orderId:
          type: integer
          nullable: true
        statusId:
          type: integer
          nullable: true
        statusCode:
          type: string
          nullable: true
        statusTitle:
          type: string
          nullable: true
        lastSyncAt:
          type: string
          format: date-time
          nullable: true

    Order:
      type: object
      properties:
        _id:
          type: string
        orderNumber:
          type: integer
        order_number:
          type: string
        payments:
          type: array
          items:
            $ref: '#/components/schemas/Payment'
        userId:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        subtotal:
          type: number
        usedBonusBalance:
          type: number
        usedReferralBalance:
          type: number
        totalToPay:
          type: number
        finalPrice:
          type: number
          nullable: true
        currency:
          type: string
          example: UAH
        lastName:
          type: string
        firstName:
          type: string
        middleName:
          type: string
          nullable: true
        customerPhone:
          type: string
        customerEmail:
          type: string
          format: email
        deliveryProvince:
          type: string
        deliveryCity:
          type: string
        deliveryPostOffice:
          type: string
        promoCode:
          type: string
        status:
          type: string
          enum:
            - pending_payment
            - paid
            - processing
            - shipped
            - delivered
            - cancelled
            - installment_waiting_store_confirm
        payment:
          type: string
        installmentMonths:
          type: integer
        sitniks:
          $ref: '#/components/schemas/SitniksInfo'
        createdAt:
          type: string
          format: date-time

    CheckoutResponse:
      type: object
      properties:
        orderId:
          type: string
        orderNumber:
          type: integer
        status:
          type: string
        subtotal:
          type: number
        usedBonusBalance:
          type: number
        usedReferralBalance:
          type: number
        totalToPay:
          type: number
        currency:
          type: string
        cashbackEarned:
          type: number
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        delivery:
          type: object
          properties:
            lastName:
              type: string
            firstName:
              type: string
            middleName:
              type: string
              nullable: true
            customerPhone:
              type: string
            customerEmail:
              type: string
              format: email
            deliveryProvince:
              type: string
            deliveryCity:
              type: string
            deliveryPostOffice:
              type: string
        payment:
          type: string
        installmentMonths:
          type: integer
        createdAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - firstName
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        firstName:
          type: string
        ref:
          type: string
          nullable: true

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    PhoneCodeRequest:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string
          description: |
            Телефон в формате E.164. Бек также принимает номер без плюса и без
            разделителей, но в ответе всегда возвращает нормализованный +380...
          example: "+380671234567"

    PhoneCodeVerifyRequest:
      type: object
      required:
        - phone
        - code
      properties:
        phone:
          type: string
          example: "+380671234567"
        code:
          type: string
          example: "5829"

    PhoneCodeRequestResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        phone:
          type: string
          example: "+380671234567"
        cooldownSeconds:
          type: integer
          example: 60
        expiresInSeconds:
          type: integer
          example: 300
      required:
        - ok
        - phone
        - cooldownSeconds
        - expiresInSeconds

    PhoneCodeVerifyResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        verified:
          type: boolean
          example: true
        phone:
          type: string
          example: "+380671234567"
        isRegistered:
          type: boolean
          example: true
        token:
          type: string
          nullable: true
        expiresIn:
          type: integer
          nullable: true
        user:
          allOf:
            - $ref: '#/components/schemas/UserShort'
          nullable: true
      required:
        - ok
        - verified
        - phone
        - isRegistered

    ResetPasswordRequest:
      type: object
      required:
        - token
        - password
      properties:
        token:
          type: string
        password:
          type: string
          format: password

    UpdateAuthMeRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        middleName:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date
          nullable: true
        phone:
          type: string
        deliveryProvince:
          type: string
        deliveryCity:
          type: string
        deliveryPostOffice:
          type: string

    UpdateUserRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string

    AddWishlistRequest:
      type: object
      required:
        - groupId
      properties:
        groupId:
          type: string

    AddCartRequest:
      type: object
      required:
        - offerId
      properties:
        offerId:
          type: string
        qty:
          type: integer
          default: 1

    PatchCartRequest:
      type: object
      required:
        - offerId
        - qty
      properties:
        offerId:
          type: string
        qty:
          type: integer

    CreateMonoPaymentRequest:
      type: object
      required:
        - totalCost
        - orderNumber
      properties:
        totalCost:
          type: number
        orderNumber:
          oneOf:
            - type: string
            - type: integer
        description:
          type: string
          nullable: true

    CreateMonoInstallmentItem:
      type: object
      properties:
        title:
          nullable: true
        name:
          nullable: true
        quantity:
          type: integer
          nullable: true
        qty:
          type: integer
          nullable: true
        price:
          type: number
          nullable: true
        sum:
          type: number
          nullable: true

    CreateMonoInstallmentRequest:
      type: object
      required:
        - totalCost
        - orderNumber
        - installmentMonths
        - clientPhone
      properties:
        totalCost:
          type: number
        orderNumber:
          oneOf:
            - type: string
            - type: integer
        installmentMonths:
          type: integer
        clientPhone:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CreateMonoInstallmentItem'

    CheckoutRequest:
      type: object
      required:
        - lastName
        - firstName
        - customerPhone
        - customerEmail
        - deliveryProvince
        - deliveryCity
        - deliveryPostOffice
        - payment
      properties:
        useBonusBalance:
          type: number
          default: 0
        useReferralBalance:
          type: number
          default: 0
        lastName:
          type: string
        firstName:
          type: string
        middleName:
          type: string
          nullable: true
        customerPhone:
          type: string
        customerEmail:
          type: string
          format: email
        deliveryProvince:
          type: string
        deliveryCity:
          type: string
        deliveryPostOffice:
          type: string
        promoCode:
          type: string
          nullable: true
        payment:
          type: string
          enum: [cod, iban, mono, installment]
        installmentMonths:
          type: integer
          nullable: true

    GuestCheckoutItem:
      type: object
      required:
        - offerId
        - qty
      properties:
        offerId:
          type: string
        qty:
          type: integer

    GuestCheckoutRequest:
      type: object
      required:
        - items
        - lastName
        - firstName
        - customerPhone
        - customerEmail
        - deliveryProvince
        - deliveryCity
        - deliveryPostOffice
        - payment
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GuestCheckoutItem'
        lastName:
          type: string
        firstName:
          type: string
        middleName:
          type: string
          nullable: true
        customerPhone:
          type: string
        customerEmail:
          type: string
          format: email
        deliveryProvince:
          type: string
        deliveryCity:
          type: string
        deliveryPostOffice:
          type: string
        promoCode:
          type: string
          nullable: true
        payment:
          type: string
          enum: [cod, iban, mono, installment]
        installmentMonths:
          type: integer
          nullable: true

    MonoInvoiceResponse:
      type: object
      additionalProperties: true
      properties:
        invoiceId:
          type: string
        pageUrl:
          type: string

    SyncInstallmentsConfirmResponse:
      type: object
      properties:
        ok:
          type: boolean
        processed:
          type: integer
        results:
          type: array
          items:
            type: object
            properties:
              order_number:
                type: string
              sitniksOrderId:
                type: integer
              sitniksStatus:
                type: object
                properties:
                  statusId:
                    type: integer
                  statusCode:
                    type: string
              monoPartsOrderId:
                type: string
              monoConfirm:
                type: object
                properties:
                  ok:
                    type: boolean
                  status:
                    type: integer

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Регистрация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Пользователь уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Логин пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Нет email или password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Неверные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Пользователь не активен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/phone/request-code:
    post:
      tags: [Auth]
      summary: Отправить SMS-код подтверждения через TurboSMS
      description: |
        Первый шаг phone auth flow.

        Как использовать на фронте:
          1. Пользователь вводит номер телефона.
          2. Фронт отправляет POST /auth/phone/request-code.
          3. При успехе запускает таймер повторной отправки по cooldownSeconds.
          4. Код действует expiresInSeconds секунд.

        Формат номера:
          - рекомендуемый: +380671234567
          - также поддерживается: 380671234567
          - также поддерживается ввод с пробелами, скобками и дефисами

        Важно:
          - в ответе phone всегда возвращается в нормализованном формате +380...
          - cooldownSeconds нужно использовать как источник истины для UI-таймера
          - при слишком частом повторе бек вернёт 429
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneCodeRequest'
            examples:
              e164:
                value:
                  phone: "+380671234567"
              digits_only:
                value:
                  phone: "380671234567"
      responses:
        '200':
          description: Код отправлен, фронт может синхронизировать таймер по cooldownSeconds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneCodeRequestResponse'
              examples:
                sent:
                  value:
                    ok: true
                    phone: "+380671234567"
                    cooldownSeconds: 60
                    expiresInSeconds: 300
        '400':
          description: Невалидный номер
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_phone:
                  value:
                    message: Phone must be a valid Ukrainian number
                    code: INVALID_PHONE
        '429':
          description: Слишком рано повторный запрос или исчерпан лимит запросов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                cooldown:
                  value:
                    message: SMS code was already requested recently
                    code: PHONE_CODE_COOLDOWN
                    details:
                      cooldownSeconds: 41
                rate_limit:
                  value:
                    message: Too many SMS code requests
                    code: PHONE_CODE_RATE_LIMIT
                    details:
                      cooldownSeconds: 1800
        '502':
          description: TurboSMS отклонил отправку или недоступен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: TurboSMS не сконфигурирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/phone/verify-code:
    post:
      tags: [Auth]
      summary: Проверить введённый SMS-код
      description: |
        Второй шаг phone auth flow.

        Как использовать на фронте:
          1. Пользователь вводит 4-значный код из SMS.
          2. Фронт отправляет POST /auth/phone/verify-code.
          3. Если isRegistered=true, бек сразу возвращает token и user.
          4. Если isRegistered=false, номер подтверждён, но регистрацию/профиль нужно завершать отдельным шагом.

        Важно:
          - при неверном коде бек вернёт 401
          - при истечении срока действия кода бек вернёт 401
          - после исчерпания лимита попыток бек вернёт 429
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneCodeVerifyRequest'
            examples:
              basic:
                value:
                  phone: "+380671234567"
                  code: "5829"
      responses:
        '200':
          description: Код подтверждён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneCodeVerifyResponse'
              examples:
                registered_user:
                  value:
                    ok: true
                    verified: true
                    phone: "+380671234567"
                    isRegistered: true
                    token: "jwt-token"
                    expiresIn: 2592000
                    user:
                      id: "67f2c5d1b9e12a0012345678"
                      email: null
                      firstName: "Anna"
                      lastName: null
                      middleName: null
                      birthDate: null
                      phone: "+380671234567"
                      status: active
                      bonusBalance: 0
                      referralBalance: 0
                      referralCode: "STR-AB12CD34"
                      invitedBy: null
                      deliveryProvince: null
                      deliveryCity: null
                      deliveryPostOffice: null
                      createdAt: "2026-04-30T10:00:00.000Z"
                phone_verified_only:
                  value:
                    ok: true
                    verified: true
                    phone: "+380671234567"
                    isRegistered: false
        '400':
          description: Невалидный номер или формат кода
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_code_format:
                  value:
                    message: Code must contain 4 digits
                    code: INVALID_PHONE_CODE
        '401':
          description: Код неверный или истёк
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                wrong_code:
                  value:
                    message: Invalid SMS verification code
                    code: INVALID_PHONE_CODE
                    details:
                      attemptsRemaining: 3
                expired:
                  value:
                    message: SMS code is expired or missing
                    code: PHONE_CODE_EXPIRED
        '429':
          description: Исчерпан лимит попыток проверки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                attempts_exhausted:
                  value:
                    message: Verification attempts exhausted
                    code: PHONE_CODE_ATTEMPTS_EXHAUSTED
                    details:
                      cooldownSeconds: 60

  /auth/me:
    get:
      tags: [Auth]
      summary: Получить текущего пользователя
      security:
        - bearerAuth: []
      responses:
        '200':
