    FacetsResponseV2:
      type: object
      description: >
        Нормализованный формат фасетов.


        В твоей базовой схеме FacetsResponse.characteristics = map(key ->
        FacetBucket[]).

        Это удобно и просто.


        В PART 3 я показал пример "color: { buckets: [...] }" — так делать НЕ
        надо,

        потому что не совпадает со схемой. Здесь — корректный вариант.
      properties:
        pricing:
          type: object
          properties:
            min:
              type: number
              nullable: true
              example: 120
            max:
              type: number
              nullable: true
              example: 1990
            currency:
              type: string
              example: UAH
        variationAxes:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/FacetBucket'
        characteristics:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/FacetBucket'
