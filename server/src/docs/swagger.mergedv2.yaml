  /catalog/offers/resolve:
    post:
      tags:
        - Офферы
      summary: Определить Offer (SKU) по выбранным опциям
      description: >
        Используется на фронте при выборе вариаций на PDP и при добавлении в
        корзину.


        Передай groupId и ЛИБО:  - optionValues: массив значений по осям
        variationAxes (по индексу)
          - optionKey: заранее собранный ключ

        ---------------------------------------------------------

        ✅ Как фронту собирать optionValues правильно

        ---------------------------------------------------------


        Пример variationAxes:  0: A1 = Объём (number)
          1: A2 = Аромат (select)
          2: A3 = Формат (select)

        Тогда если пользователь выбрал:  A1=250
          A2="rose"
          A3="bottle"

        optionValues будет:  [250, "rose", "bottle"]


        ---------------------------------------------------------

        ✅ Рекомендация по optionKey

        ---------------------------------------------------------

        Собирай на сервере (в момент создания оффера) так:  optionKey =
        optionValues.map(v => String(v)).join("|")


        Чтобы не было кавычек:  "orange"|30  ❌
          orange|30    ✅

        ---------------------------------------------------------

        ✅ Доп. проверки

        ---------------------------------------------------------

        - если optionValues.length != variationAxes.length -> 400

        - если есть undefined в массиве -> 400

        - если типы не совпали (number vs string) -> 400 (по желанию)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferResolveRequest'
            examples:
              ПоValues:
                value:
                  groupId: G100
                  optionValues:
                    - 250
                    - rose
                    - bottle
              ПоKey:
                value:
                  groupId: G100
                  optionKey: 250|rose|bottle
              ПоValues_ТестЦветаOrange:
                value:
                  groupId: G100
                  optionValues:
                    - 250
                    - orange
                    - bottle
              ПоValues_ТестЦвета30:
                value:
                  groupId: G100
                  optionValues:
                    - 250
                    - 30
                    - bottle
      responses:
        '200':
          description: Найденный Offer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferResolveResponse'
              examples:
                Found:
                  value:
                    offer:
                      _id: O1001
                      groupId: G100
                      sku: KPRO-250-ROSE-BTL
                      price: 390
                      opt_price: null
                      available: true
                      img: https://cdn.site/demo/shampoo/250-rose-bottle.webp
                      optionValues:
                        - 250
                        - rose
                        - bottle
                      optionKey: 250|rose|bottle
        '400':
          description: >-
            Ошибка запроса (не хватает optionValues/optionKey или неверный
            формат)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Missing:
                  value:
                    message: Нужно передать optionValues или optionKey
                    code: BAD_REQUEST
                WrongLength:
                  value:
                    message: optionValues length must match variationAxes length
                    code: BAD_REQUEST
                BadTypes:
                  value:
                    message: optionValues types do not match variationAxes
                    code: BAD_REQUEST
        '404':
          description: Offer не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                NotFound:
                  value:
                    message: Offer не найден
                    code: NOT_FOUND
