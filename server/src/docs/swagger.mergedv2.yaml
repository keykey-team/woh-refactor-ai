  /catalog/facets/v2:
    get:
      tags:
        - Каталог
      summary: Получить фасеты (v2, нормализованный формат)
      description: |
        То же, что /catalog/facets, но схема ответа — FacetsResponseV2.

        Зачем:
          - если хочется зафиксировать контракт
          - если в будущем появятся доп. поля (например, "selected", "sortHint", "unit")
      parameters:
        - $ref: '#/components/parameters/StatusParam'
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
        - name: categoryInclude
          in: query
          required: false
          schema:
            type: string
            enum:
              - branch
              - self
            default: branch
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: onlyAvailable
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: priceMin
          in: query
          required: false
          schema:
            type: number
            nullable: true
        - name: priceMax
          in: query
          required: false
          schema:
            type: number
            nullable: true
        - name: char
          in: query
          required: false
          schema:
            type: string
        - name: opt
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Facets v2
          content:
            application/json:
              schema:
                type: object
                properties:
                  facets:
                    $ref: '#/components/schemas/FacetsResponseV2'
              examples:
                Example:
                  value:
                    facets:
                      pricing:
                        min: 120
                        max: 1990
                        currency: UAH
                      variationAxes:
                        A1:
                          - value: 250
                            count: 18
                          - value: 500
                            count: 9
                      characteristics:
                        color:
                          - value: null
                            count: 66
                          - value: berry
                            count: 42
                          - value: orange
                            count: 42
                          - value: 30
                            count: 21
                          - value: beige
                            count: 19
                          - value: black
                            count: 19
                          - value: white
                            count: 19
        '400':
          description: Ошибка в параметрах запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV2'
              examples:
                BadJson:
                  value:
                    message: Некорректный JSON в параметре opt/char
                    code: BAD_REQUEST
                    details:
                      validation:
                        - field: opt
                          reason: Invalid JSON
                          expected: object
                          got: string
