          type: string
          example: 2.3.1
        time:
          type: string
          example: '2026-02-26T10:00:00Z'
      required:
        - status
    ValidationErrorDetails:
      type: object
      description: |
        Детализация ошибок валидации (какой параметр и что не так).
      properties:
        field:
          type: string
          example: opt
        reason:
          type: string
          example: Invalid JSON
        expected:
          type: string
          nullable: true
          example: object
        got:
          type: string
          nullable: true
          example: string
    ErrorResponseV2:
