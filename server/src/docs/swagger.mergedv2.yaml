openapi: 3.0.3
info:
  title: Универсальный API каталога интернет-магазина
  version: 2.4.0
  description: >
    Канонический API для универсального шаблона интернет-магазина (modular
    monolith friendly).


    Концепции (DSL e-commerce):  - Category: дерево категорий неограниченной
    глубины (parentId/path/ancestors)
      - ProductGroup: одна SEO-страница товара (карточка товара)
      - Offer: SKU/вариация товара, описана optionValues[] строго в порядке ProductGroup.variationAxes[]
      - Characteristics: динамические характеристики товара (ProductGroup.characteristics[])
      - Characteristics Meta: словарь характеристик для построения фильтров на фронте (type/unit/valuesPreset/filterable/searchable)
      - Catalog Cards: быстрый DTO для листинга (агрегация цен, наличия, preview по вариациям)
      - Soft-deletes/visibility: status=active/hidden/draft (без удаления из БД)
      - Multi-category: ProductGroup может принадлежать нескольким категориям (categoryIds[])
servers:
  - url: /v1
tags:
  - name: Категории
    description: Дерево категорий (меню, навигация, хлебные крошки, sitemap)
  - name: Каталог
    description: Карточки каталога, фильтрация, фасеты, страница товара (PDP)
  - name: Характеристики
    description: Словарь характеристик для UI фильтров
  - name: Офферы
    description: Разрешение выбранной вариации в конкретный SKU (Offer)
  - name: Service
    description: Служебные эндпоинты (ping/health)
components:
  securitySchemes:
    PublicApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: >
        Опционально. Используется если нужно ограничить публичный доступ или
        сделать rate-limit по ключам.

        Если у проекта публичный каталог — схему можно не включать на уровне
        операций.
  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    LocalizedText:
      type: object
      additionalProperties: true
      example:
        ua: Назва товару
        en: Название товара
    LocalizedSlug:
      type: object
      description: >
        Опционально: если нужно хранить разные SEO-slug по языкам.

        Если у вас slug общий — можно не использовать (оставить просто slug:
        string).
      properties:
        ua:
          type: string
          example: shampun-keratin-pro
        en:
          type: string
          example: shampun-keratin-pro
    Money:
      type: object
      description: Денежное значение
      properties:
        value:
          type: number
          example: 390
        currency:
          type: string
          example: UAH
      required:
        - value
        - currency
    SeoMeta:
      type: object
      description: SEO-мета для страницы категории/товара
      properties:
        title:
          $ref: '#/components/schemas/LocalizedText'
        description:
          $ref: '#/components/schemas/LocalizedText'
        h1:
          $ref: '#/components/schemas/LocalizedText'
        canonical:
          type: string
          nullable: true
          example: https://site.com/ua/shampoo-keratin-pro
        noindex:
          type: boolean
          example: false
        ogImage:
          type: string
          nullable: true
          example: https://cdn.site/og/shampoo.webp
    Image:
      type: object
      description: |
        Унифицированное описание изображения.
        cover можно дублировать в imageURL для быстрого доступа.
      properties:
        url:
          type: string
          example: https://cdn.site/demo/shampoo/cover.webp
        alt:
          $ref: '#/components/schemas/LocalizedText'
        sort:
          type: integer
          example: 10
      required:
        - url
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 24
        total:
          type: integer
          example: 132
        pages:
          type: integer
          example: 6
      required:
        - page
        - limit
        - total
        - pages
    Category:
      type: object
      properties:
        _id:
          type: string
          example: C3
        parentId:
          type: string
          nullable: true
          example: C2
        slug:
          type: string
          example: shampoo
        slugI18n:
          $ref: '#/components/schemas/LocalizedSlug'
        title:
          $ref: '#/components/schemas/LocalizedText'
        description:
          $ref: '#/components/schemas/LocalizedText'
        seo:
          $ref: '#/components/schemas/SeoMeta'
        icon:
          type: string
          nullable: true
          example: https://cdn.site/icons/hair.svg
        image:
          type: string
          nullable: true
          example: https://cdn.site/categories/hair.webp
        path:
          type: array
          items:
            type: string
          example:
            - cosmetics
            - hair
            - shampoo
        ancestors:
          type: array
          items:
            type: string
          example:
            - C1
            - C2
        status:
          type: string
          example: active
        sort:
          type: integer
          example: 10
        createdAt:
          type: string
          format: date-time
          example: '2026-02-20T10:11:12.000Z'
        updatedAt:
          type: string
          format: date-time
          example: '2026-02-25T09:00:00.000Z'
    CategoryNode:
      allOf:
        - $ref: '#/components/schemas/Category'
        - type: object
          properties:
            children:
              type: array
              items:
                $ref: '#/components/schemas/CategoryNode'
    VariationAxis:
      type: object
      description: |
        Ось вариации товара (ProductGroup.variationAxes[]).

        ВАЖНО:
          - Порядок осей КРИТИЧЕН.
          - Offer.optionValues[] хранит значения строго в этом порядке.
          - axisId используется для фильтра (opt) и для построения UI (кнопки/селекты).

        Пример:
          variationAxes = [
            { axisId:"A1", title:"Объём", type:"number", unit:"ml" },
            { axisId:"A2", title:"Аромат", type:"select" },
            { axisId:"A3", title:"Формат", type:"select" }
          ]

          Тогда Offer.optionValues = [250, "rose", "bottle"]

        UI подсказка:
          - type=number + unit => UI может рендерить "250 мл"
          - type=select => UI рендерит чипы/селект
      properties:
        axisId:
          type: string
          example: A1
        title:
          $ref: '#/components/schemas/LocalizedText'
        type:
          type: string
          enum:
            - number
            - select
            - string
          example: number
        unit:
          type: string
          nullable: true
          example: ml
        valuesPreset:
          type: array
          items: {}
          example:
            - 250
            - 500
        sort:
          type: integer
          nullable: true
          example: 10
      required:
        - axisId
        - title
        - type
    VariantPreviewAxis:
      type: object
      description: |
        Preview значений вариаций для каталога.
        Возвращается в /catalog/cards -> variantPreview.axes.

        Зачем:
          - В каталоге нельзя грузить все offers (дорого).
          - Но UI должен показать доступные варианты (пример: объёмы 250/500).

        axisIndex - индекс оси в variationAxes[].
        values - уникальные значения, ограниченные maxValuesPerAxis.
      properties:
        axisIndex:
          type: integer
          example: 0
        axisId:
          type: string
          nullable: true
          example: A1
        title:
          $ref: '#/components/schemas/LocalizedText'
        type:
          type: string
          example: number
        unit:
          type: string
          nullable: true
          example: ml
        values:
          type: array
          items: {}
          example:
            - 250
            - 500
    Offer:
      type: object
      additionalProperties: true
      description: |
        Offer отдается как есть из Mongo. Ниже указаны основные ожидаемые поля.
      properties:
        _id:
          type: string
        groupId:
          type: string
        sku:
          type: string
        integrationSku:
          type: string
        price:
          type: number
        effectivePrice:
          type: number
        discount:
          type: number
        quantity:
          type: number
        name:
          $ref: '#/components/schemas/LocalizedText'
    Pricing:
      type: object
      properties:
        min:
          type: number
          nullable: true
          example: 360
        max:
          type: number
          nullable: true
          example: 610
        currency:
          type: string
          example: UAH
    Availability:
      type: object
      properties:
        hasAvailable:
          type: boolean
          example: true
        variantsCount:
          type: integer
          example: 12
    CharacteristicValue:
      type: object
      description: |
        Динамическая характеристика товара.

        В ProductGroup хранится массив characteristics[].
        Для разных type используется либо value, либо values:

          type=string|number|boolean|select -> value
          type=multiselect                  -> values (массив)

        Примеры:
          { key:"brand", type:"select", value:"KeratinPro" }
          { key:"sulfate_free", type:"boolean", value:true }
          { key:"hair_type", type:"multiselect", values:["dry","damaged"] }
      properties:
        key:
          type: string
          example: brand
        type:
          type: string
          enum:
            - string
            - number
            - boolean
            - select
            - multiselect
          example: select
        unit:
          type: string
          nullable: true
          example: null
        value:
          description: Для string/number/boolean/select
          nullable: true
          example: KeratinPro
        values:
          description: Для multiselect
          type: array
          items: {}
          example:
            - dry
            - damaged
      required:
        - key
        - type
    CharacteristicMeta:
      type: object
      description: |
        Словарь характеристик для UI.

        Фронт использует meta чтобы:
          - построить фильтры (filterable=true)
          - построить поиск по характеристике (searchable=true)
          - понять тип, unit, пресеты значений
          - сортировать отображение (sort)

        Важно по типам:
          - type=number + filterable=true => UI обычно рендерит range (min/max)
          - type=select => single select
          - type=multiselect => multi select (чекбоксы)
          - type=boolean => switch/checkbox
      properties:
        key:
          type: string
          example: brand
        title:
          $ref: '#/components/schemas/LocalizedText'
        type:
          type: string
          enum:
            - string
            - number
            - boolean
            - select
            - multiselect
          example: select
        unit:
          type: string
          nullable: true
          example: null
        valuesPreset:
          type: array
          items: {}
          example:
            - KeratinPro
            - Davines
            - Lador
        filterable:
          type: boolean
          example: true
        searchable:
          type: boolean
          example: true
        sort:
          type: integer
          example: 10
        status:
          type: string
          example: active
    CatalogCard:
      type: object
      description: |
        Карточка каталога (DTO) — оптимизированный объект для листинга.

        Почему не отдаём ProductGroup целиком:
          - листинг должен быть быстрым
          - offers может быть много (10..500)
          - preview по вариациям позволяет рисовать UI без загрузки всех SKU

        includeOffers:
          - none    -> offers=[]
          - preview -> offers=[bestOffer] (1 элемент)
          - all     -> offers=[...] до maxOffersPerGroup

        Важно:
          - groupId используется как стабильный идентификатор группы (ProductGroup._id)
          - slug для PDP
          - pricing/availability — агрегаты по offers с учетом фильтров onlyAvailable
      properties:
        groupId:
          type: string
          example: G100
        slug:
          type: string
          example: shampoo-keratin-pro
        title:
          $ref: '#/components/schemas/LocalizedText'
        imageURL:
          type: string
          nullable: true
          example: https://cdn.site/demo/shampoo/cover.webp
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        categoryIds:
          type: array
          items:
            type: string
          example:
            - C3
        status:
          type: string
          example: active
        pricing:
          $ref: '#/components/schemas/Pricing'
        availability:
          $ref: '#/components/schemas/Availability'
        variantPreview:
          type: object
          properties:
            depth:
              type: integer
              example: 2
            axes:
              type: array
              items:
                $ref: '#/components/schemas/VariantPreviewAxis'
        offers:
          type: array
          items:
            $ref: '#/components/schemas/Offer'
        ui:
          type: object
          properties:
            variationAxes:
              type: array
              items:
                $ref: '#/components/schemas/VariationAxis'
            badges:
              type: array
              items:
                type: string
              example:
                - hit
                - new
        characteristics:
          type: array
          items:
            $ref: '#/components/schemas/CharacteristicValue'
          description: >
            Опционально: includeCharacteristics=true добавит
            ProductGroup.characteristics в карточку.
        updatedAt:
          type: string
          format: date-time
          example: '2026-02-25T10:00:00.000Z'
    CatalogCardsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CatalogCard'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
        - items
        - meta
    FacetBucket:
      type: object
      properties:
        value:
          description: Значение “корзины” (bucket)
          nullable: true
          example: rose
        count:
          type: integer
          example: 12
    FacetRange:
      type: object
      description: |
        Range-фасет (обычно для type=number).
        Может использоваться для характеристик и для price.
      properties:
        min:
          type: number
          nullable: true
          example: 120
        max:
          type: number
          nullable: true
          example: 1990
    FacetsResponse:
      type: object
      description: |
        Фасеты для UI фильтров (счётчики).

        Возвращает:
          - pricing min/max внутри текущих фильтров
          - variationAxes: axisId -> buckets
          - characteristics:
              - buckets для select/multiselect/boolean
              - range для number (если реализовано)
      properties:
        pricing:
          type: object
          properties:
            min:
              type: number
              nullable: true
              example: 120
            max:
              type: number
              nullable: true
              example: 1990
            currency:
              type: string
              example: UAH
        variationAxes:
          description: Счётчики по осям вариаций. axisId -> buckets
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/FacetBucket'
          example:
            A1:
              - value: 250
                count: 18
              - value: 500
                count: 9
            A2:
              - value: rose
                count: 10
              - value: mint
                count: 7
            A3:
              - value: bottle
                count: 12
              - value: refill
                count: 8
        characteristics:
          description: >
            Счётчики по характеристикам.

            key -> либо buckets[] (select/multiselect/boolean), либо range
            (number).
          type: object
          additionalProperties: true
          example:
            brand:
              buckets:
                - value: KeratinPro
                  count: 14
                - value: Davines
                  count: 6
            sulfate_free:
              buckets:
                - value: true
                  count: 20
                - value: false
                  count: 5
            weight_g:
              range:
                min: 50
                max: 1000
    ProductGroupDetails:
      type: object
      description: |
        Детальная страница товара (PDP).

        Возвращает:
          - сам ProductGroup (основные поля)
          - variationAxes (оси вариаций)
          - characteristics (характеристики)
          - все offers (SKU)
          - агрегированную цену/наличие

        Важно:
          - offers всегда в одном массиве
          - фронт строит UI из variationAxes
          - затем резолвит offer через /catalog/offers/resolve (или выбирает напрямую по optionKey)
      properties:
        _id:
          type: string
          example: G100
        slug:
          type: string
          example: shampoo-keratin-pro
        title:
          $ref: '#/components/schemas/LocalizedText'
        description:
          $ref: '#/components/schemas/LocalizedText'
        seo:
          $ref: '#/components/schemas/SeoMeta'
        imageURL:
          type: string
          example: https://cdn.site/demo/shampoo/cover.webp
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        categoryIds:
          type: array
          items:
            type: string
          example:
            - C3
        status:
          type: string
          example: active
        flags:
          type: object
          properties:
            isNew:
              type: boolean
              example: true
            isHit:
              type: boolean
              example: false
            isSale:
              type: boolean
              example: false
        variationAxes:
          type: array
          items:
            $ref: '#/components/schemas/VariationAxis'
        characteristics:
          type: array
          items:
            $ref: '#/components/schemas/CharacteristicValue'
        pricing:
          $ref: '#/components/schemas/Pricing'
        availability:
          $ref: '#/components/schemas/Availability'
        offers:
          type: array
          items:
            $ref: '#/components/schemas/Offer'
        updatedAt:
          type: string
          format: date-time
          example: '2026-02-25T10:00:00.000Z'
    OfferResolveRequest:
      type: object
      properties:
        groupId:
          type: string
          example: G100
        optionValues:
          type: array
          items: {}
          example:
            - 250
            - rose
            - bottle
        optionKey:
          type: string
          nullable: true
          example: 250|rose|bottle
      required:
        - groupId
      description: |
        Нужно передать groupId и ЛИБО optionValues, ЛИБО optionKey.

        optionValues:
          - строго совпадает с порядком variationAxes в ProductGroup

        optionKey:
          - заранее собранный ключ
          - удобно кешировать на фронте

        Ошибки:
          - если передан optionValues неверной длины (не совпадает с variationAxes.length) — BAD_REQUEST
          - если комбинация не найдена — NOT_FOUND
    OfferResolveResponse:
      type: object
      properties:
        offer:
          $ref: '#/components/schemas/Offer'
      required:
        - offer
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
    UserShort:
      type: object
      properties:
        id:
          type: string
          example: 67f2c5d1b9e12a0012345678
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        middleName:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date-time
          nullable: true
        phone:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - active
            - blocked
            - pending
        bonusBalance:
          type: number
        referralBalance:
          type: number
        referralCode:
          type: string
          nullable: true
        invitedBy:
          type: string
          nullable: true
        deliveryProvince:
          type: string
          nullable: true
        deliveryCity:
          type: string
          nullable: true
        deliveryPostOffice:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserShort'
        token:
          type: string
        expiresIn:
          type: integer
      required:
        - user
        - token
        - expiresIn
    AuthMeResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        middleName:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date-time
          nullable: true
        phone:
          type: string
          nullable: true
        deliveryProvince:
          type: string
          nullable: true
        deliveryCity:
          type: string
          nullable: true
        deliveryPostOffice:
          type: string
          nullable: true
        status:
          type: string
        bonusBalance:
          type: number
        referralBalance:
          type: number
        referralCode:
          type: string
          nullable: true
        invitedBy:
          type: string
          nullable: true
        cart:
          type: array
          items:
            $ref: '#/components/schemas/CartItemRaw'
        wishlist:
          type: array
          items:
            $ref: '#/components/schemas/ProductGroup'
        orders:
          type: array
          items:
            $ref: '#/components/schemas/UserOrderRef'
        createdAt:
          type: string
          format: date-time
    UserOrderRef:
      type: object
      properties:
        orderId:
          type: string
        orderNumber:
          type: number
        createdAt:
          type: string
          format: date-time
        total:
          type: number
        status:
          type: string
    ProductGroup:
      type: object
      additionalProperties: true
      description: |
        ProductGroup отдается как есть из Mongo. Структура может быть шире,
        чем описано здесь.
      properties:
        _id:
          type: string
        title:
          $ref: '#/components/schemas/LocalizedText'
        name:
          $ref: '#/components/schemas/LocalizedText'
        slug:
          type: string
        reviews:
          type: array
          items:
            type: object
    CartItemRaw:
      type: object
      properties:
        offerId:
          type: string
        qty:
          type: integer
        priceAtAdd:
          type: number
        groupId:
          type: string
          nullable: true
        sku:
          type: string
          nullable: true
    CartItemResponse:
      type: object
      properties:
        offerId:
          type: string
        qty:
          type: integer
        priceAtAdd:
          type: number
        offer:
          allOf:
            - $ref: '#/components/schemas/Offer'
          nullable: true
        group:
          allOf:
            - $ref: '#/components/schemas/ProductGroup'
          nullable: true
    OrderItem:
      type: object
      properties:
        offerId:
          type: string
        groupId:
          type: string
          nullable: true
        sku:
          type: string
          nullable: true
        optionKey:
          type: string
          nullable: true
        optionValues:
          type: array
          items: {}
        titleSnapshot:
          nullable: true
        imgSnapshot:
          type: string
          nullable: true
        qty:
          type: integer
        pricePerUnit:
          type: number
        subtotal:
          type: number
    Payment:
      type: object
      properties:
        payment_method_id:
          type: integer
