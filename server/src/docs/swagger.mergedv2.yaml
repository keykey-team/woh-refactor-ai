  parameters:
    StatusParam:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum:
          - active
          - hidden
          - draft
        default: active
      description: Фильтр по статусу (где применимо).
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Номер страницы (начиная с 1).
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 24
      description: Кол-во элементов на странице.
    LanguageParam:
      name: lang
      in: query
      required: false
      schema:
        type: string
        enum:
          - ua
          - en
        default: ua
      description: >
        Опционально: язык ответа для некоторых полей (если захотите отдавать
        "flattened" заголовки).

        В текущей модели вы храните i18n целиком (ua/en), поэтому параметр можно
        игнорировать.
paths:
  /catalog/ping:
    get:
      tags:
        - Service
      summary: Ping каталога
      description: Простой эндпоинт для проверки доступности сервиса.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
              examples:
                Ok:
                  value:
                    ok: true
  /catalog/categories/tree:
    get:
      tags:
        - Категории
      summary: Получить дерево категорий целиком
      description: |
        Возвращает дерево категорий (неограниченная глубина).
        Используется для меню, сайдбара, sitemap.

        Параметр status:
          - active -> только активные
          - hidden -> скрытые (для админки)
          - draft  -> если у вас появится черновик (опционально)
      parameters:
        - $ref: '#/components/parameters/StatusParam'
      responses:
        '200':
          description: Дерево категорий
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CategoryNode'
              examples:
                ПримерДерева_3Уровня:
                  value:
                    items:
                      - _id: C1
                        parentId: null
                        slug: cosmetics
                        title:
                          ua: Косметика
                          en: Косметика
                        path:
                          - cosmetics
                        ancestors: []
                        status: active
                        sort: 10
                        children:
                          - _id: C2
                            parentId: C1
                            slug: hair
                            title:
                              ua: Волосся
                              en: Волосы
                            path:
                              - cosmetics
                              - hair
                            ancestors:
                              - C1
                            status: active
                            sort: 10
                            children:
                              - _id: C3
                                parentId: C2
                                slug: shampoo
                                title:
                                  ua: Шампуні
                                  en: Шампуни
                                path:
                                  - cosmetics
                                  - hair
                                  - shampoo
                                ancestors:
                                  - C1
                                  - C2
                                status: active
                                sort: 10
                                children: []
                ПримерДерева_СНесколькимиКорнями:
                  value:
                    items:
                      - _id: C10
                        parentId: null
                        slug: skin-structure
                        title:
                          ua: Skin Structure
                          en: Skin Structure
                        path:
                          - skin-structure
                        ancestors: []
                        status: active
                        sort: 10
                        children:
                          - _id: C11
                            parentId: C10
                            slug: cleansing
                            title:
                              ua: Очищення
                              en: Очищение
                            path:
                              - skin-structure
                              - cleansing
                            ancestors:
                              - C10
                            status: active
                            sort: 10
                            children:
                              - _id: C12
                                parentId: C11
                                slug: foam
                                title:
                                  ua: Пінка
                                  en: Пенка
                                path:
                                  - skin-structure
                                  - cleansing
                                  - foam
                                ancestors:
                                  - C10
                                  - C11
                                status: active
                                sort: 10
                                children: []
                      - _id: C20
                        parentId: null
                        slug: hair-structure
                        title:
                          ua: Hair Structure
                          en: Hair Structure
                        path:
                          - hair-structure
                        ancestors: []
                        status: active
                        sort: 20
                        children: []
        '400':
          description: Ошибка в параметрах запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /catalog/categories/children:
    get:
      tags:
        - Категории
      summary: Получить дочерние категории по parentId (lazy load)
      description: |
        Возвращает детей для parentId.
        Если parentId не задан или null — вернёт корневые категории.

        Использование:
          - мобильное меню подгружает детей по клику
          - админка подгружает узлы дерева без выдачи всего дерева
      parameters:
        - name: parentId
          in: query
          required: false
          schema:
            type: string
            nullable: true
          description: ID родительской категории (null/empty -> корни).
        - $ref: '#/components/parameters/StatusParam'
      responses:
        '200':
          description: Список категорий
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
              examples:
                ПримерКорней:
                  value:
                    items:
                      - _id: C10
                        parentId: null
                        slug: skin-structure
                        title:
                          ua: Skin Structure
                          en: Skin Structure
                        path:
                          - skin-structure
                        ancestors: []
                        status: active
                        sort: 10
                      - _id: C20
                        parentId: null
                        slug: hair-structure
                        title:
                          ua: Hair Structure
                          en: Hair Structure
                        path:
                          - hair-structure
                        ancestors: []
                        status: active
                        sort: 20
                ПримерДетей:
                  value:
                    items:
                      - _id: C11
                        parentId: C10
                        slug: cleansing
                        title:
                          ua: Очищення
                          en: Очищение
                        path:
                          - skin-structure
                          - cleansing
                        ancestors:
                          - C10
                        status: active
                        sort: 10
                      - _id: C13
                        parentId: C10
                        slug: hydration
                        title:
                          ua: Зволоження
                          en: Увлажнение
                        path:
                          - skin-structure
                          - hydration
                        ancestors:
                          - C10
                        status: active
                        sort: 20
        '400':
          description: Ошибка в параметрах запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /catalog/categories/breadcrumbs:
    get:
      tags:
        - Категории
      summary: Получить хлебные крошки для категории
      description: |
        Возвращает массив категорий от корня до выбранной категории.
        Используется в UI: Главная / Косметика / Волосы / Шампуни

        Реализация:
          - category.ancestors[] хранит ObjectId всех предков
          - breadcrumbs = ancestors + self
      parameters:
        - name: categoryId
          in: query
          required: true
          schema:
            type: string
          description: ID категории.
      responses:
        '200':
          description: Массив breadcrumbs
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
              examples:
                Пример:
                  value:
                    items:
                      - _id: C10
                        parentId: null
                        slug: skin-structure
                        title:
                          ua: Skin Structure
                          en: Skin Structure
                        path:
                          - skin-structure
                        ancestors: []
                        status: active
                        sort: 10
                      - _id: C11
                        parentId: C10
                        slug: cleansing
                        title:
                          ua: Очищення
                          en: Очищение
                        path:
                          - skin-structure
                          - cleansing
                        ancestors:
                          - C10
                        status: active
                        sort: 10
                      - _id: C12
                        parentId: C11
                        slug: foam
                        title:
                          ua: Пінка
                          en: Пенка
                        path:
                          - skin-structure
                          - cleansing
                          - foam
                        ancestors:
                          - C10
                          - C11
                        status: active
                        sort: 10
        '400':
          description: categoryId обязателен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Missing:
                  value:
                    message: categoryId is required
                    code: BAD_REQUEST
  /catalog/characteristics/meta:
    get:
      tags:
        - Характеристики
      summary: Получить словарь характеристик (meta)
      description: |
        Фронт использует этот endpoint чтобы построить фильтры “на лету”:
          - тип фильтра (select/multiselect/range/boolean)
          - единицы измерения (unit)
          - пресеты значений (valuesPreset)
          - видимость в фильтре (filterable)
          - поиск по характеристике (searchable)

        Важно:
          - meta.key — это тот же ключ, что используется в ProductGroup.characteristics[].key
          - meta.type определяет формат фильтра
          - valuesPreset — подсказки для UI (не обязаны быть полными)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - active
              - hidden
            default: active
          description: Фильтр по статусу meta (active/hidden).
      responses:
        '200':
          description: Список meta характеристик
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CharacteristicMeta'
              examples:
                ПримерMeta_Базовый:
                  value:
                    items:
                      - key: brand
                        title:
                          ua: Бренд
                          en: Бренд
                        type: select
                        unit: null
                        valuesPreset:
                          - KeratinPro
                          - Davines
                          - Lador
                        filterable: true
                        searchable: true
                        sort: 10
                        status: active
                      - key: sulfate_free
                        title:
                          ua: Без сульфатів
