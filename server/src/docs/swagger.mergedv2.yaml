            type: boolean
            default: true
          description: Включить variantPreview.
        - name: depth
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 20
            default: 2
          description: Кол-во осей в preview.
        - name: maxValuesPerAxis
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 6
          description: Лимит значений preview на ось.
        - name: includeCharacteristics
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Добавить характеристики в карточки.
        - name: char
          in: query
          required: false
          schema:
            type: string
          description: |
            JSON-фильтр характеристик ProductGroup.

            Примеры:
              char={"brand":"KeratinPro"}
              char={"sulfate_free":true}
              char={"hair_type":["dry","damaged"]}
        - name: opt
          in: query
          required: false
          schema:
            type: string
          description: |
            JSON-фильтр вариаций по axisId.

            Примеры:
              opt={"A1":250}
              opt={"A1":250,"A2":"rose"}
      responses:
