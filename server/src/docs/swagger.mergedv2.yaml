            default: none
          description: none/preview/all.
        - name: maxOffersPerGroup
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 80
          description: Лимит offers при includeOffers=all.
        - name: preview
          in: query
          required: false
